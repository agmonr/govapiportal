  Self-contained build of the data.gov.il explorer.
  Generated by tools/bundle.py from src/ - do not edit by hand.

<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>המאגר הממשלתי הפתוח — חקירה מלאה</title>
  <style>
/*
 * RTL-first. Layout uses logical properties throughout (margin-inline-start,
 * not margin-left) so the whole sheet works unchanged if dir flips to ltr.
 */

:root {
  --bg: #ffffff;
  --fg: #14161a;
  --muted: #5c6370;
  --border: #dfe3e8;
  --accent: #1c5fd8;
  --surface: #f6f7f9;
  --danger: #b3261e;
  --radius: 8px;
  --maxw: 1100px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14161a;
    --fg: #e8eaed;
    --muted: #9aa0a8;
    --border: #2c3039;
    --accent: #7aa5f5;
    --surface: #1b1e24;
    --danger: #f2766b;
  }
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font: 16px/1.55 system-ui, "Segoe UI", Arial, sans-serif;
}

.wrap { max-width: var(--maxw); margin-inline: auto; padding: 1.5rem 1rem 4rem; }

header.site {
  border-block-end: 1px solid var(--border);
  background: var(--surface);
}
header.site .wrap { padding-block: 1rem; display: flex; align-items: baseline; gap: 1rem; }
header.site h1 { font-size: 1.15rem; margin: 0; }
header.site a { color: var(--accent); text-decoration: none; font-size: .9rem; }

/* Mixed Hebrew/Latin content reorders incorrectly without per-element dir.
   Anything holding API-sourced text gets dir="auto" in the markup. */
[dir="auto"] { unicode-bidi: plaintext; }

input[type="search"], input[type="text"], select {
  font: inherit;
  padding: .55rem .7rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--fg);
  inline-size: 100%;
}

.searchbar { display: flex; gap: .5rem; margin-block-end: 1.25rem; }
.searchbar input { flex: 1; }

button {
  font: inherit;
  padding: .55rem .9rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--fg);
  cursor: pointer;
}
button:hover:not(:disabled) { border-color: var(--accent); }
button:disabled { opacity: .5; cursor: default; }

.card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .9rem 1rem;
  margin-block-end: .75rem;
}
.card h3 { margin: 0 0 .3rem; font-size: 1rem; }
.card h3 a { color: var(--accent); text-decoration: none; }
.card p { margin: .25rem 0; color: var(--muted); font-size: .9rem; }

.meta { display: flex; flex-wrap: wrap; gap: .5rem; font-size: .8rem; color: var(--muted); }
.tag {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: .1rem .55rem;
}

.notice { padding: .8rem 1rem; border-radius: var(--radius); margin-block-end: 1rem; }
.notice.error { background: color-mix(in srgb, var(--danger) 12%, transparent); border: 1px solid var(--danger); }
.notice.info  { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

.skeleton { color: var(--muted); padding: 2rem 0; }

/* ---------- API map ---------- */

.lead { color: var(--muted); max-inline-size: 62ch; margin-block-end: 1.5rem; }

.controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-block-end: .75rem; }
.controls input[type="search"] { flex: 1; min-inline-size: 15rem; }
.check { display: flex; align-items: center; gap: .4rem; font-size: .9rem; color: var(--muted); white-space: nowrap; }
.check input { inline-size: auto; }

#summary { margin-block-end: 1rem; }

.api-head { display: flex; align-items: baseline; gap: .75rem; justify-content: space-between; }

/* Status colour is carried by a text label too, not colour alone. */
.badge {
  font-size: .75rem;
  padding: .15rem .6rem;
  border-radius: 999px;
  white-space: nowrap;
  border: 1px solid;
}
.badge.ok      { color: #1a7f45; border-color: #1a7f45; background: color-mix(in srgb, #1a7f45 10%, transparent); }
.badge.warn    { color: #9a6700; border-color: #9a6700; background: color-mix(in srgb, #9a6700 10%, transparent); }
.badge.bad     { color: var(--danger); border-color: var(--danger); background: color-mix(in srgb, var(--danger) 10%, transparent); }
.badge.limited { color: #6d4aa8; border-color: #6d4aa8; background: color-mix(in srgb, #6d4aa8 10%, transparent); }
.badge.unknown { color: var(--muted); border-color: var(--border); }

@media (prefers-color-scheme: dark) {
  .badge.ok      { color: #5fce8f; border-color: #2f7d4f; }
  .badge.warn    { color: #e0b341; border-color: #7d652f; }
  .badge.limited { color: #b79ae8; border-color: #5c4487; }
}

/* Left border repeats the verdict for scanning down the list. */
.card.api { border-inline-start-width: 3px; }
.card.api.ok   { border-inline-start-color: #1a7f45; }
.card.api.warn { border-inline-start-color: #9a6700; }
.card.api.bad  { border-inline-start-color: var(--danger); }
.card.api.limited { border-inline-start-color: #6d4aa8; }

/* ---------- top view ---------- */

.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
  gap: .6rem;
  margin-block-end: 1rem;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: .15rem;
  text-align: start;
  padding: .7rem .85rem;
  border: 1px solid var(--border);
  border-inline-start-width: 3px;
  border-radius: var(--radius);
  background: var(--bg);
}
button.stat { cursor: pointer; }
.stat-n { font-size: 1.6rem; font-weight: 600; line-height: 1.1; font-variant-numeric: tabular-nums; }
.stat-l { font-size: .8rem; color: var(--muted); }

.stat.ok      { border-inline-start-color: #1a7f45; }
.stat.warn    { border-inline-start-color: #9a6700; }
.stat.limited { border-inline-start-color: #6d4aa8; }
.stat.bad     { border-inline-start-color: var(--danger); }
.stat.unknown { border-inline-start-color: var(--muted); }
.stat.active  { background: var(--surface); box-shadow: inset 0 0 0 1px var(--accent); }

/* The table is the widest thing on the page; it scrolls, the body never does. */
.matrix-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }

.matrix { border-collapse: collapse; inline-size: 100%; font-size: .85rem; }
.matrix th, .matrix td { padding: .45rem .7rem; text-align: start; white-space: nowrap; }
.matrix thead th {
  font-size: .75rem;
  font-weight: 600;
  color: var(--muted);
  background: var(--surface);
  border-block-end: 1px solid var(--border);
  position: sticky;
  inset-block-start: 0;
}
/* A 50-row preview must not push the rest of the page down: it gets its own
   viewport and scrolls inside it. The sticky thead above keeps the headers -
   and therefore the sort controls - reachable while scrolled. */
.matrix-wrap.scroll { max-block-size: 26rem; overflow-y: auto; }

/* Only columns the server can sort by are interactive - see headCell(). */
.matrix th.sortable { cursor: pointer; user-select: none; }
.matrix th.sortable:hover { color: var(--fg); }
.matrix th.sortable:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--accent); }
.matrix th.sorted { color: var(--accent); }
.s-mark { font-size: .7em; margin-inline-start: .3rem; opacity: .45; }
.matrix th.sorted .s-mark { opacity: 1; }

.matrix tr.grp th {
  font-size: .8rem;
  background: var(--surface);
  border-block: 1px solid var(--border);
}
.grp-sub { font-weight: 400; color: var(--muted); font-size: .75rem; }

.matrix tr.row { cursor: pointer; border-block-end: 1px solid var(--border); }
.matrix tr.row:hover, .matrix tr.row:focus-visible { background: var(--surface); outline: none; }
.matrix tr.row:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); }
.matrix tr.row td:first-child { border-inline-start: 3px solid transparent; font-weight: 500; }
.matrix tr.row.ok      td:first-child { border-inline-start-color: #1a7f45; }
.matrix tr.row.warn    td:first-child { border-inline-start-color: #9a6700; }
.matrix tr.row.limited td:first-child { border-inline-start-color: #6d4aa8; }
.matrix tr.row.bad     td:first-child { border-inline-start-color: var(--danger); }
.matrix tr.row.unknown td:first-child { border-inline-start-color: var(--border); }

/* Jump target needs to announce itself - the card is mid-page and looks like its neighbours. */
.card.api.flash { background: color-mix(in srgb, var(--accent) 10%, transparent); transition: background .4s; }

/* ---------- portal grid ---------- */

.section { font-size: 1rem; margin-block: 2rem .75rem; color: var(--muted); font-weight: 600; }
.section:first-of-type { margin-block-start: 0; }

.portal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(15rem, 1fr));
  gap: .75rem;
}

.portal {
  display: flex;
  flex-direction: column;
  gap: .35rem;
  text-align: start;
  padding: .85rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  cursor: pointer;
}
.portal:hover { border-color: var(--accent); }
.portal.active { border-color: var(--accent); background: var(--surface); box-shadow: inset 0 0 0 1px var(--accent); }

.p-head { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
.p-name { font-weight: 600; }
.p-sub  { font-size: .78rem; color: var(--muted); }
.p-about { font-size: .85rem; color: var(--muted); line-height: 1.45; }

/* ---------- live explorer ---------- */

.toggle-ex { font-size: .85rem; padding: .35rem .7rem; margin-block-start: .5rem; }

.explorer {
  margin-block-start: .75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .7rem;
  background: var(--surface);
}
.ex-bar { display: flex; gap: .4rem; align-items: stretch; flex-wrap: wrap; }
.ex-method {
  font-size: .78rem; font-weight: 600;
  padding: .5rem .6rem;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); color: var(--accent);
  text-decoration: none; white-space: nowrap;
  display: inline-flex; align-items: center;
}
.ex-method:hover { border-color: var(--accent); }
.ex-method.disabled { pointer-events: none; opacity: .5; color: var(--muted); }
.ex-method.static { color: var(--muted); cursor: default; }
.ex-url { flex: 1; min-inline-size: 12rem; font-family: ui-monospace, Menlo, monospace; font-size: .8rem; }
.ex-status { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; margin-block: .6rem .4rem; }

.ex-out pre {
  margin: 0;
  max-block-size: 22rem;
  overflow: auto;              /* long responses scroll inside the panel */
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .6rem;
  font-size: .78rem;
  line-height: 1.45;
  white-space: pre;
}
.j-key  { color: var(--accent); }
.j-str  { color: #1a7f45; }
.j-num  { color: #9a6700; }
.j-bool { color: var(--danger); }
@media (prefers-color-scheme: dark) {
  .j-str { color: #5fce8f; }
  .j-num { color: #e0b341; }
}

/* Endpoints are LTR inside an RTL page; they must scroll, not widen it. */
.endpoint { overflow-x: auto; }
.endpoint code {
  font-size: .82rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: .15rem .4rem;
  white-space: nowrap;
}

/* ---------- data.gov.il explorer ---------- */

.ckan { border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.ckan .lead { margin-block-start: 0; font-size: .92rem; }

.ck-crumbs { display: flex; flex-wrap: wrap; align-items: center; gap: .35rem; margin-block-end: .8rem; font-size: .85rem; }
.ck-crumb {
  font: inherit; font-size: .85rem; padding: .15rem .4rem; cursor: pointer;
  color: var(--accent); background: none; border: none; border-radius: 4px; text-decoration: underline;
}
.ck-crumb:hover { background: var(--surface); }
.ck-here { color: var(--muted); }
.ck-sep { color: var(--muted); }

.ck-controls { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-block-end: .6rem; }
.ck-controls input[type="search"] { flex: 1 1 14rem; font-size: .9rem; padding: .45rem .65rem; }
.ck-controls input[type="search"]:disabled { opacity: .5; cursor: not-allowed; }
.ck-controls select {
  font: inherit; font-size: .82rem; padding: .35rem .5rem; max-inline-size: 100%;
  color: var(--fg); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
}
.ck-count { font-size: .85rem; color: var(--muted); margin-block-end: .6rem; }

/* min(17rem, 100%) rather than a bare 17rem: below a 17rem viewport the track
   would otherwise stay 17rem wide and push the page sideways. */
.ck-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(17rem, 100%), 1fr)); gap: .6rem; }
.ck-card {
  display: flex; flex-direction: column; gap: .3rem; text-align: start; cursor: pointer;
  padding: .7rem .8rem; font: inherit;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  /* A `1fr` track floors at min-content, so one long unbroken string in a title
     or description widens the track past the viewport and scrolls the whole
     page - measured at 85px over on a 380px screen. These two lines are what
     stop dataset text from dictating the layout. */
  min-inline-size: 0;
  overflow-wrap: anywhere;
}
.ck-card:hover { background: var(--surface); border-color: var(--accent); }
.ck-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.ck-title { font-weight: 600; font-size: .92rem; }
.ck-org { font-size: .78rem; color: var(--muted); }
.ck-notes { font-size: .8rem; color: var(--muted); line-height: 1.4; }
.ck-meta { display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; margin-block-start: .2rem; }
.ck-n { font-size: .72rem; color: var(--muted); }

.ck-detail h3 { margin-block: 0 .6rem; font-size: 1.05rem; }
.ck-detail h4 { margin-block: 1.2rem .5rem; font-size: .9rem; color: var(--muted); }
.ck-facts { display: grid; grid-template-columns: auto 1fr; gap: .25rem .8rem; margin: 0 0 .8rem; font-size: .85rem; }
.ck-facts dt { color: var(--muted); }
.ck-facts dd { margin: 0; }
.ck-desc { font-size: .88rem; line-height: 1.6; white-space: pre-wrap; }
.ck-tags { display: flex; flex-wrap: wrap; gap: .3rem; }
.ck-open {
  font: inherit; font-size: .76rem; padding: .2rem .55rem; cursor: pointer;
  color: var(--bg); background: var(--accent); border: 1px solid var(--accent); border-radius: 999px;
}
.ck-open:hover { filter: brightness(1.1); }
.ck-nodata { font-size: .72rem; color: var(--muted); }

/* The record table: one column per field, so it is wide by nature. */
.ck-rec th { vertical-align: top; }
.ck-type { display: block; font-size: .65rem; font-weight: 400; color: var(--muted); }
.ck-fil th { padding: .25rem .35rem; background: var(--surface); position: sticky; inset-block-start: 3.1rem; }
.ck-fil input {
  inline-size: 100%; min-inline-size: 6rem; font: inherit; font-size: .75rem; padding: .2rem .35rem;
  color: var(--fg); background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
}
.ck-rec tbody td { border-block-end: 1px solid var(--border); max-inline-size: 22rem; overflow: hidden; text-overflow: ellipsis; }

/* ---------- portal drill-in ---------- */

.p-open { font-size: .8rem; color: var(--accent); margin-block-start: .2rem; }

.drill {
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: .9rem 1rem;
  margin-block: 1rem 0;
  background: var(--surface);
}
.drill-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
.drill-head h2 { font-size: 1.05rem; margin: 0; }
.drill-close { font-size: .8rem; padding: .25rem .6rem; }
.drill-sub { font-size: .85rem; color: var(--muted); margin-block: .2rem .6rem; }

/* The request is shown so the result can be reproduced outside the page. */
/* The preview stops at the catalogue; this points at the page that does not. */
.drill-more { margin-inline-start: .5rem; font-size: .8rem; white-space: nowrap; }

.drill-url { margin-block: .6rem 0; overflow-x: auto; }
.drill-url code { font-size: .74rem; color: var(--muted); white-space: nowrap; }

/* Preview tables hold prose, unlike the API matrix - let long values wrap
   inside a bounded cell instead of stretching the table off-screen. */
.matrix.preview td { white-space: normal; max-inline-size: 22rem; }
.matrix.preview td.ident { font-weight: 500; }
.matrix.preview tbody tr:nth-child(even) { background: color-mix(in srgb, var(--fg) 3%, transparent); }

/* Filter box inside a portal drill-in. */
.drill-filter { display: flex; gap: .5rem; align-items: center; margin-block-end: .7rem; }
/* Offset paging. Server-side `start`, so these move through the whole result
   set rather than through what was already fetched. */
.pager { display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; margin-block-start: .7rem; }
.pager .pg {
  font: inherit;
  font-size: .82rem;
  padding: .25rem .6rem;
  min-inline-size: 2.2rem;
  color: var(--fg);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
}
.pager .pg:hover:not(:disabled) { background: var(--surface); }
.pager .pg:disabled { color: var(--muted); cursor: default; opacity: .55; }
.pager .pg.cur {
  color: var(--bg);
  background: var(--accent);
  border-color: var(--accent);
  font-weight: 600;
}
.pg-gap { color: var(--muted); padding-inline: .1rem; }

/* Column filters. Each is one fq clause, so they compose with the search box. */
.drill-cols { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-block-end: .7rem; }
.drill-cols select {
  font: inherit;
  font-size: .82rem;
  padding: .3rem .5rem;
  max-inline-size: 100%;
  color: var(--fg);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.drill-filter input[type="search"] { flex: 1; font-size: .9rem; padding: .45rem .65rem; }
/* Server-side vs local is not cosmetic: it says whether you are searching the
   whole collection or only the rows already fetched. */
.drill-scope {
  font-size: .72rem;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: .15rem .55rem;
  white-space: nowrap;
}

/* Expandable rows: a dataset opens into its downloadable files. */
.matrix.preview.expandable tr.has-files { cursor: pointer; }
.matrix.preview.expandable tr.has-files:hover,
.matrix.preview.expandable tr.has-files:focus-visible { background: var(--surface); outline: none; }
.matrix.preview.expandable tr.has-files:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); }
.matrix.preview .c-x { inline-size: 1.6rem; text-align: center; }
.x-mark { color: var(--muted); font-size: .8rem; }
.matrix.preview tr.files-row td { background: var(--surface); padding: .5rem .7rem; }

.files { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .3rem; }
.files a {
  display: flex; align-items: center; gap: .6rem;
  padding: .4rem .6rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  text-decoration: none;
  color: var(--fg);
  font-size: .85rem;
}
.files a:hover { border-color: var(--accent); }
/* Format first and size up front: one of these is a 9 MB CSV. */
.f-fmt {
  font-size: .7rem; font-weight: 600; color: var(--accent);
  border: 1px solid var(--accent); border-radius: 4px;
  padding: .05rem .35rem; min-inline-size: 3rem; text-align: center;
}
.f-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.f-size { color: var(--muted); font-size: .78rem; white-space: nowrap; }
.f-tag {
  font-size: .68rem; color: var(--muted);
  border: 1px solid var(--border); border-radius: 999px; padding: .05rem .45rem;
  white-space: nowrap;
}
.f-go { color: var(--accent); }
.files-note { font-size: .76rem; color: var(--muted); margin-block: .45rem 0; }
.slow-note { display: block; font-size: .78rem; color: var(--muted); margin-block-start: .25rem; }
</style>
</head>

  <header class="site">
    <div class="wrap">
      <h1>המאגר הממשלתי הפתוח</h1>
      <span class="meta"><a href="./index.html">← חזרה למפת ה-API</a></span>
    </div>
  </header>

  <main class="wrap">
    <div id="app">
      <p class="lead" dir="auto">
        <strong>data.gov.il</strong> הוא הפורטל היחיד במפה שחושף את הרשומות עצמן ולא רק קטלוג של קבצים.
        הדף הזה יורד עד אליהן: קטלוג של 1,197 מאגרים ← מאגר בודד ← טבלת הנתונים,
        עם חיפוש, סינון לפי עמודה, מיון ודפדוף — הכל מתבצע בשרת, על כלל הרשומות.
      </p>
      <div id="ckan"></div>
    </div>
  </main>

// Generated by tools/bundle.py - edit src/ and apis.json, then regenerate.
/** Shared DOM helpers. */

const el = (id) => document.getElementById(id);

/* Shared by every renderer. They live here rather than in one module because
   bundle.py flattens all sources into a single scope - a second `const num`
   anywhere would be a redeclaration, not a shadow. */

const num = (v) => (v == null ? '—' : Number(v).toLocaleString('he-IL'));

/** Bytes -> a size someone can judge a download by. */
function bytes(n) {
  if (n == null || Number.isNaN(Number(n))) return '';
  const u = ['B', 'KB', 'MB', 'GB'];
  let v = Number(n), i = 0;
  while (v >= 1024 && i < u.length - 1) { v /= 1024; i += 1; }
  return `${v.toFixed(v < 10 && i ? 1 : 0)} ${u[i]}`;
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  })[c]);
}

/** Renders CkanError.kind as something a user can act on. */
function showError(node, err) {
  const messages = {
    blocked:
      'החסימה מגיעה מ-data.gov.il (403). נסה שוב בעוד מספר דקות.',
    rate_limit: 'יותר מדי בקשות. ממתין ומנסה שוב…',
    network: 'שגיאת רשת. בדוק את החיבור לאינטרנט.',
  };
  const hint = messages[err?.kind] || err?.message || 'אירעה שגיאה.';
  node.innerHTML = `<div class="notice error" dir="auto">${esc(hint)}</div>`;
  if (err) console.error(err);
}

function showInfo(node, text) {
  node.innerHTML = `<div class="notice info" dir="auto">${esc(text)}</div>`;
}

function showLoading(node, text = 'טוען…') {
  node.innerHTML = `<div class="skeleton" dir="auto">${esc(text)}</div>`;
}

const clear = (node) => { node.innerHTML = ''; };

const param = (name) => new URLSearchParams(location.search).get(name);

/** Debounce for search-as-you-type without hammering the API. */
function debounce(fn, ms = 300) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}

/**
 * data.gov.il in depth - the one portal that rewards going all the way in.
 *
 * The portal drill-in above shows what every source returns. This goes three
 * levels further, because CKAN is the only API here that exposes the records
 * themselves rather than just a catalogue of files:
 *
 *   catalogue  package_search   1,197 datasets, faceted, sorted, paged
 *   dataset    (already in hand) description, licence, tags, resources
 *   records    datastore_search the actual rows inside one resource
 *
 * Every control is server-side. Probed before being wired: `q` (full text),
 * `q={"FIELD":"..."}` (full text within one field), `filters` (exact match),
 * `sort`, `offset`, `fields`. Nothing here filters a fetched page and calls it
 * a search.
 *
 * The ceiling is real and worth knowing: `datastore_search_sql` is WAF-blocked
 * (403), so there is no server-side aggregation. Counting, grouping or joining
 * would have to happen client-side over whatever was fetched, which for a
 * 3,051-row resource would be a subset pretending to be a total. So this offers
 * search, filter, sort and paging - and deliberately offers no statistics.
 */

const CK_API = 'https://data.gov.il/api/3/action';
const CK_DATASETS = 20;   // cards are taller than table rows
const CK_RECORDS = 25;

/** Only ~55% of resources are datastore_active; the rest are downloads only. */
const ckQueryable = (r) => Boolean(r.datastore_active);

const ckState = {
  view: 'list',            // list | dataset | records
  q: '', org: '', format: '', sort: '', start: 0,
  pkg: null, resource: null,
  rq: '', rfilters: {}, rsort: '', rdir: 'asc', rstart: 0,
};

let ckFacets = null;        // captured once - CKAN narrows these to the active fq
let ckRoot = null;

const CK_SORTS = [
  ['', 'רלוונטיות'],
  ['metadata_modified desc', 'עודכן לאחרונה'],
  ['title_string asc', 'שם א׳–ת׳'],
  ['organization asc', 'גוף מפרסם'],
];

/* ---------- requests ---------- */

function ckCatalogUrl() {
  const p = new URLSearchParams({ rows: String(CK_DATASETS) });
  if (ckState.q) p.set('q', ckState.q);
  const fq = [];
  if (ckState.org) fq.push(`organization:${ckState.org}`);
  if (ckState.format) fq.push(`res_format:${ckState.format}`);
  if (fq.length) p.set('fq', fq.join(' '));
  if (ckState.sort) p.set('sort', ckState.sort);
  if (ckState.start) p.set('start', String(ckState.start));
  p.set('facet.field', '["organization","res_format"]');
  p.set('facet.limit', '100');
  return `${CK_API}/package_search?${p}`;
}

function ckRecordsUrl() {
  const p = new URLSearchParams({ resource_id: ckState.resource.id, limit: String(CK_RECORDS) });
  // Per-field full text rather than `filters`, which is exact-match and would
  // silently return nothing for a partial value someone typed by hand.
  const per = Object.entries(ckState.rfilters).filter(([, v]) => v.trim());
  if (per.length) p.set('q', JSON.stringify(Object.fromEntries(per)));
  else if (ckState.rq) p.set('q', ckState.rq);
  if (ckState.rsort) p.set('sort', `${ckState.rsort} ${ckState.rdir}`);
  if (ckState.rstart) p.set('offset', String(ckState.rstart));
  return `${CK_API}/datastore_search?${p}`;
}

async function ckGet(url) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 25000);
  const res = await fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (!json.success) throw new Error(json.error?.message || 'CKAN error');
  return json.result;
}

/* ---------- shared bits ---------- */

const ckLoading = (t = 'טוען…') => `<div class="skeleton" dir="auto">${esc(t)}</div>`;

function ckFailed(err, url) {
  // A cross-origin block reaches JS as an opaque TypeError with no status, and
  // an abort is a timeout. Neither is "the server said no", so say which.
  const why = err.name === 'AbortError'
    ? 'הבקשה חרגה מזמן ההמתנה. נסה שוב.'
    : err instanceof TypeError
      ? 'הבקשה נחסמה על ידי הדפדפן (CORS) או שהרשת נכשלה — הדפדפן אינו חושף את הסיבה המדויקת.'
      : `הבקשה נכשלה: ${esc(err.message)}`;
  return `<div class="notice error" dir="auto">${why}</div>
    <p class="drill-url" dir="ltr"><code>${esc(url)}</code></p>`;
}

/** first / last / current's neighbours - never a wall of page numbers. */
function ckPager(cur, last, cls) {
  if (last < 1) return '';
  const want = [...new Set([0, cur - 1, cur, cur + 1, last])]
    .filter((p) => p >= 0 && p <= last).sort((a, b) => a - b);
  const btn = (p, label) => `<button type="button" class="pg${p === cur ? ' cur' : ''}" `
    + `data-${cls}="${p}"${p === cur ? ' aria-current="page"' : ''}>${esc(label)}</button>`;
  const dead = (label) => `<button type="button" class="pg" disabled>${esc(label)}</button>`;

  const out = [];
  let prev = -1;
  for (const p of want) {
    if (prev >= 0 && p > prev + 1) out.push('<span class="pg-gap">…</span>');
    out.push(btn(p, String(p + 1)));
    prev = p;
  }
  return `<nav class="pager" aria-label="ניווט בין עמודים" dir="rtl">
    ${cur > 0 ? btn(cur - 1, 'הקודם') : dead('הקודם')}${out.join('')}${cur < last ? btn(cur + 1, 'הבא') : dead('הבא')}
  </nav>`;
}

const ckCrumbs = (parts) => `<nav class="ck-crumbs" dir="auto">${parts.map((p, i) => (p.to
  ? `<button type="button" class="ck-crumb" data-go="${esc(p.to)}">${esc(p.label)}</button>`
  : `<span class="ck-here">${esc(p.label)}</span>`) + (i < parts.length - 1 ? '<span class="ck-sep">›</span>' : '')).join('')}</nav>`;

/* ---------- level 1: the catalogue ---------- */

async function ckRenderList() {
  const url = ckCatalogUrl();
  ckRoot.querySelector('.ck-body').innerHTML = ckLoading('מחפש מאגרים…');

  let r;
  try { r = await ckGet(url); } catch (err) {
    ckRoot.querySelector('.ck-body').innerHTML = ckFailed(err, url); return;
  }

  if (!ckFacets) ckFacets = r.search_facets || {};
  const last = Math.ceil(r.count / CK_DATASETS) - 1;
  const cur = Math.floor(ckState.start / CK_DATASETS);

  const opts = (field, sel, all) => `<option value="">${esc(all)}</option>` + (ckFacets[field]?.items || [])
    .slice().sort((a, b) => b.count - a.count)
    .map((it) => `<option value="${esc(it.name)}"${sel === it.name ? ' selected' : ''}>`
      + `${esc(it.display_name || it.name)} (${num(it.count)})</option>`).join('');

  ckRoot.querySelector('.ck-body').innerHTML = `
    <div class="ck-controls">
      <input type="search" class="ck-q" dir="auto" spellcheck="false"
             value="${esc(ckState.q)}" placeholder="חפש בכל 1,197 המאגרים…" aria-label="חיפוש מאגרים">
      <select class="ck-org" aria-label="גוף מפרסם" dir="auto">${opts('organization', ckState.org, 'כל הגופים')}</select>
      <select class="ck-fmt" aria-label="פורמט" dir="auto">${opts('res_format', ckState.format, 'כל הפורמטים')}</select>
      <select class="ck-sort" aria-label="מיון" dir="auto">${CK_SORTS.map(([v, l]) =>
        `<option value="${esc(v)}"${ckState.sort === v ? ' selected' : ''}>${esc(l)}</option>`).join('')}</select>
      <span class="drill-scope">הכל בשרת</span>
    </div>

    <div class="ck-count" dir="auto">${r.count
      ? `${num(ckState.start + 1)}–${num(ckState.start + r.results.length)} מתוך <strong>${num(r.count)}</strong> מאגרים`
      : 'לא נמצאו מאגרים'}</div>

    <div class="ck-cards">
      ${r.results.map((ds) => {
        const res = ds.resources || [];
        const fmts = [...new Set(res.map((x) => (x.format || '?').toUpperCase()))];
        const live = res.filter(ckQueryable).length;
        return `
        <button type="button" class="ck-card" data-pkg="${esc(ds.name)}" dir="auto">
          <span class="ck-title">${esc(ds.title || ds.name)}</span>
          <span class="ck-org">${esc(ds.organization?.title || '—')}</span>
          ${ds.notes ? `<span class="ck-notes">${esc(ds.notes.slice(0, 160))}${ds.notes.length > 160 ? '…' : ''}</span>` : ''}
          <span class="ck-meta">
            ${fmts.slice(0, 5).map((f) => `<span class="f-fmt">${esc(f)}</span>`).join('')}
            <span class="ck-n">${res.length} קבצים</span>
            ${live ? `<span class="f-tag">${live} ניתנים לשאילתה</span>` : ''}
          </span>
        </button>`;
      }).join('')}
    </div>
    ${ckPager(cur, last, 'page')}
    <p class="drill-url" dir="ltr"><code>${esc(url)}</code></p>`;

  ckBindList(r);
}

function ckBindList(r) {
  const b = ckRoot.querySelector('.ck-body');
  const q = b.querySelector('.ck-q');
  const reset = (fn) => (...a) => { ckState.start = 0; return fn(...a); };

  const rerun = debounce(reset(() => { ckState.q = q.value.trim(); ckRenderList(); }), 450);
  q.addEventListener('input', rerun);
  q.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); ckState.start = 0; ckState.q = q.value.trim(); ckRenderList(); }
  });

  const pick = (sel, key) => b.querySelector(sel).addEventListener('change', (e) => {
    ckState[key] = e.target.value; ckState.start = 0; ckRenderList();
  });
  pick('.ck-org', 'org'); pick('.ck-fmt', 'format'); pick('.ck-sort', 'sort');

  b.querySelectorAll('[data-page]').forEach((btn) => btn.addEventListener('click', () => {
    ckState.start = Number(btn.dataset.page) * CK_DATASETS; ckRenderList();
  }));

  b.querySelectorAll('[data-pkg]').forEach((card) => card.addEventListener('click', () => {
    ckState.pkg = r.results.find((d) => d.name === card.dataset.pkg);
    ckState.view = 'dataset';
    ckRender();
  }));
}

/* ---------- level 2: one dataset ---------- */

function ckRenderDataset() {
  const ds = ckState.pkg;
  const res = ds.resources || [];
  const date = (v) => (v ? new Date(v).toLocaleDateString('he-IL') : '—');

  ckRoot.querySelector('.ck-body').innerHTML = `
    <article class="ck-detail" dir="auto">
      <h3>${esc(ds.title || ds.name)}</h3>
      <dl class="ck-facts">
        <dt>גוף מפרסם</dt><dd>${esc(ds.organization?.title || '—')}</dd>
        <dt>רישיון</dt><dd>${esc(ds.license_title || '—')}</dd>
        <dt>עודכן</dt><dd>${esc(date(ds.metadata_modified))}</dd>
        <dt>נוצר</dt><dd>${esc(date(ds.metadata_created))}</dd>
      </dl>
      ${ds.notes ? `<p class="ck-desc">${esc(ds.notes)}</p>` : ''}
      ${ds.tags?.length ? `<p class="ck-tags">${ds.tags.map((t) =>
        `<span class="tag">${esc(t.display_name || t.name)}</span>`).join('')}</p>` : ''}

      <h4>קבצים (${res.length})</h4>
      <ul class="files">
        ${res.map((x, i) => `
          <li>
            <span class="f-fmt">${esc((x.format || '?').toUpperCase())}</span>
            <span class="f-name">${esc(x.name || x.description || '(ללא שם)')}</span>
            ${x.size ? `<span class="f-size">${esc(bytes(x.size))}</span>` : ''}
            ${ckQueryable(x)
              ? `<button type="button" class="ck-open" data-res="${i}">עיין בנתונים ←</button>`
              : '<span class="ck-nodata" title="המשאב אינו טעון ל-DataStore">קובץ להורדה בלבד</span>'}
            <a class="f-go" href="${esc(x.url)}" target="_blank" rel="noopener" title="הורדה">⭳</a>
          </li>`).join('')}
      </ul>
      <p class="files-note" dir="auto">
        רק חלק מהמשאבים טעונים ל-DataStore וניתנים לשאילתה — השאר הם קבצים להורדה בלבד.
        קבצי CSV/XLSX מוגשים דרך ה-WAF של data.gov.il; אם נפתח דף ביניים, המתן רגע.
      </p>
    </article>`;

  const b = ckRoot.querySelector('.ck-body');
  b.querySelectorAll('[data-res]').forEach((btn) => btn.addEventListener('click', () => {
    ckState.resource = res[Number(btn.dataset.res)];
    ckState.rq = ''; ckState.rfilters = {}; ckState.rsort = ''; ckState.rstart = 0;
    ckState.view = 'records';
    ckRender();
  }));
}

/* ---------- level 3: the records inside a resource ---------- */

async function ckRenderRecords() {
  const url = ckRecordsUrl();
  ckRoot.querySelector('.ck-body').innerHTML = ckLoading('שולף רשומות…');

  let r;
  try { r = await ckGet(url); } catch (err) {
    ckRoot.querySelector('.ck-body').innerHTML = ckFailed(err, url); return;
  }

  // _id is CKAN's own row key; showing it as a column is noise.
  const fields = r.fields.filter((f) => f.id !== '_id');
  const last = Math.ceil(r.total / CK_RECORDS) - 1;
  const cur = Math.floor(ckState.rstart / CK_RECORDS);
  const filtered = Object.values(ckState.rfilters).some((v) => v.trim());
  // CKAN estimates the row count for large tables rather than counting them.
  // Printing an estimate as an exact figure would be a precision claim the API
  // never made - it says so in the response, so the UI says so too.
  const est = Boolean(r.total_was_estimated);

  ckRoot.querySelector('.ck-body').innerHTML = `
    <div class="ck-controls">
      <input type="search" class="ck-rq" dir="auto" spellcheck="false" value="${esc(ckState.rq)}"
             placeholder="חיפוש חופשי בכל השדות…" aria-label="חיפוש ברשומות"
             ${filtered ? 'disabled title="בטל את סינון העמודות כדי לחפש בכל השדות"' : ''}>
      <span class="drill-scope">חיפוש בשרת, על כל ${num(r.total)} הרשומות</span>
    </div>

    <div class="ck-count" dir="auto">${r.total
      ? `${num(ckState.rstart + 1)}–${num(ckState.rstart + r.records.length)} מתוך
         <strong${est ? ' title="CKAN מחזיר אומדן ולא ספירה מדויקת עבור טבלאות גדולות"' : ''}>${
           est ? '≈' : ''}${num(r.total)}</strong> רשומות${est ? ' (אומדן)' : ''}`
      : 'אין רשומות התואמות לסינון'}</div>

    ${r.records.length ? `
    <div class="matrix-wrap scroll">
      <table class="matrix preview ck-rec">
        <thead>
          <tr>${fields.map((f) => {
            const active = ckState.rsort === f.id;
            const next = active && ckState.rdir === 'asc' ? 'desc' : 'asc';
            return `<th class="sortable${active ? ' sorted' : ''}" data-sort="${esc(f.id)}" data-dir="${next}"
                        tabindex="0" role="button" title="${esc(f.type)} — מיון בשרת"
                        aria-sort="${active ? (ckState.rdir === 'asc' ? 'ascending' : 'descending') : 'none'}">
              ${esc(f.id)}<span class="s-mark">${active ? (ckState.rdir === 'asc' ? '▲' : '▼') : '↕'}</span>
              <span class="ck-type">${esc(f.type)}</span>
            </th>`;
          }).join('')}</tr>
          <tr class="ck-fil">${fields.map((f) => `<th>
            <input type="search" class="ck-cf" data-field="${esc(f.id)}" dir="auto" spellcheck="false"
                   value="${esc(ckState.rfilters[f.id] || '')}" placeholder="סנן…" aria-label="סינון ${esc(f.id)}">
          </th>`).join('')}</tr>
        </thead>
        <tbody>
          ${r.records.map((rec) => `<tr>${fields.map((f) =>
            `<td dir="auto">${esc(rec[f.id] ?? '')}</td>`).join('')}</tr>`).join('')}
        </tbody>
      </table>
    </div>
    ${ckPager(cur, last, 'rpage')}` : ''}
    <p class="drill-url" dir="ltr"><code>${esc(url)}</code></p>`;

  ckBindRecords();
}

function ckBindRecords() {
  const b = ckRoot.querySelector('.ck-body');

  const rq = b.querySelector('.ck-rq');
  const runQ = debounce(() => { ckState.rstart = 0; ckState.rq = rq.value.trim(); ckRenderRecords(); }, 450);
  rq.addEventListener('input', runQ);

  // Per-column boxes send q={"FIELD":"value"} - full text within that field.
  // Losing focus on every re-ckRender would make typing impossible, so the field
  // being edited is restored and the caret put back at the end.
  const runCol = debounce((field) => {
    ckState.rstart = 0;
    ckRenderRecords().then(() => {
      const back = ckRoot.querySelector(`.ck-cf[data-field="${CSS.escape(field)}"]`);
      if (back) { back.focus(); back.setSelectionRange(back.value.length, back.value.length); }
    });
  }, 500);

  b.querySelectorAll('.ck-cf').forEach((inp) => inp.addEventListener('input', () => {
    ckState.rfilters[inp.dataset.field] = inp.value;
    if (!inp.value.trim()) delete ckState.rfilters[inp.dataset.field];
    runCol(inp.dataset.field);
  }));

  b.querySelectorAll('th.sortable').forEach((th) => {
    const apply = () => {
      ckState.rsort = th.dataset.sort; ckState.rdir = th.dataset.dir; ckState.rstart = 0; ckRenderRecords();
    };
    th.addEventListener('click', apply);
    th.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); apply(); }
    });
  });

  b.querySelectorAll('[data-rpage]').forEach((btn) => btn.addEventListener('click', () => {
    ckState.rstart = Number(btn.dataset.rpage) * CK_RECORDS; ckRenderRecords();
  }));
}

/* ---------- shell ---------- */

function ckRender() {
  const trail = [{ label: 'כל המאגרים', to: ckState.view === 'list' ? null : 'list' }];
  if (ckState.pkg && ckState.view !== 'list') {
    trail.push({ label: ckState.pkg.title || ckState.pkg.name, to: ckState.view === 'dataset' ? null : 'dataset' });
  }
  if (ckState.view === 'records') {
    trail.push({ label: ckState.resource.name || 'נתונים', to: null });
  }
  ckRoot.querySelector('.ck-crumbs-slot').innerHTML = ckCrumbs(trail);
  ckRoot.querySelectorAll('[data-go]').forEach((btn) => btn.addEventListener('click', () => {
    ckState.view = btn.dataset.go;
    ckRender();
  }));

  if (ckState.view === 'list') ckRenderList();
  else if (ckState.view === 'dataset') ckRenderDataset();
  else ckRenderRecords();
}

function mountCkan(node) {
  ckRoot = node;
  ckRoot.innerHTML = `
    <div class="ckan">
      <p class="lead" dir="auto">
        הפורטל היחיד כאן שחושף את <strong>הרשומות עצמן</strong> ולא רק את קטלוג הקבצים.
        חפש מאגר, פתח אותו, ואז עיין בטבלת הנתונים — חיפוש, סינון לפי עמודה, מיון ודפדוף,
        הכל מתבצע בשרת על כלל הרשומות.
      </p>
      <div class="ck-crumbs-slot"></div>
      <div class="ck-body"></div>
    </div>`;
  ckRender();
}

/**
 * Entry point for datagov.html.
 *
 * The explorer lives on its own page rather than in the map: it is the only
 * source here whose records can be read, and giving it a URL means it can be
 * linked to directly instead of being scrolled to. The map stays a map.
 */


mountCkan(el('ckan'));

</script>
</body>
</html>
