/**
 * Shared chart-rendering primitives, used by accidents.js, committees.js,
 * companies.js, local-finance.js and welfare.js.
 *
 * Until today each page kept its own copy (renderBarChart existed nearly
 * verbatim in three files; renderGroupedChart + its axis/color helpers were
 * copy-pasted whole from local-finance.js into welfare.js). That was a
 * deliberate choice early on, mirroring portal.js's per-API renderers
 * ("each returns a completely different shape") - but these three functions
 * were never actually different shapes, just different call sites. Sharing
 * them means a visual/behavioral fix (the peak-zero NaN guard below, for
 * instance - present in some copies, missing in others) now has one place
 * to land instead of three-to-five.
 *
 * What's deliberately NOT here: any page's own data-fetching or business
 * logic (what counts as "revenue", which resource to query, how to filter a
 * table row) - that part really does differ per page and stays in each
 * page's own file.
 */

/* ---------- single-series vertical bar chart -------------------------------
 * Used for: accidents.html (killed/total per year, with an active-year
 * highlight), committees.html (meetings by year/type), companies.html
 * (status/type distribution), local-finance.html (national YoY surplus).
 *
 * `entries`: [{ label, value, active? }]. `unit` is optional - the tooltip
 * only appends it when non-empty, so callers with no natural unit (a plain
 * count) don't get a trailing space. `opts.ariaLabel` and
 * `opts.emptyMessage` cover the two things that varied between the original
 * per-page copies (accidents.js set an aria-label; committees.js had a more
 * specific "no data in the selected range" empty message). */
function renderBarChart(figId, caption, entries, unit = '', colorClass = '', opts = {}) {
  const { ariaLabel, emptyMessage = 'אין נתונים להצגה.' } = opts;
  const fig = el(figId);
  if (!entries.length) { fig.innerHTML = `<figcaption>${esc(caption)}</figcaption><p class="acc-hint">${esc(emptyMessage)}</p>`; return; }
  // abs() so a signed series (local-finance's deficit years) scales the same
  // way an unsigned one does; a no-op for callers that never have negatives.
  const peak = Math.max(...entries.map((e) => Math.abs(e.value)));
  const bars = entries.map((e) => {
    const h = peak ? Math.round((Math.abs(e.value) / peak) * 150) : 0; // guards a peak of 0 -> NaN height, missing from some of the original copies
    return `
      <div class="acc-bar${e.active ? ' active' : ''}" title="${esc(e.label)}: ${num(e.value)}${unit ? ` ${esc(unit)}` : ''}">
        <div class="acc-bar-track">
          <span class="acc-bar-v">${num(e.value)}</span>
          <div class="acc-bar-fill" style="block-size:${h}px"></div>
        </div>
        <span class="acc-bar-y">${esc(e.label)}</span>
      </div>`;
  }).join('');
  fig.className = `acc-chart${colorClass ? ` ${colorClass}` : ''}`;
  if (ariaLabel) fig.setAttribute('aria-label', ariaLabel);
  else fig.removeAttribute('aria-label');
  fig.innerHTML = `<figcaption>${esc(caption)}</figcaption><div class="acc-bars">${bars}</div>`;
}

/* ---------- horizontal leaderboard ------------------------------------------
 * A ranked top-N reads far better as rows stacked top-to-bottom than as N
 * vertical bars squeezed into one fixed-height row - a different mark from
 * renderBarChart, not that same one rotated. `entries`: [{ label, value,
 * compare? }] - `compare: true` renders a row in the same grayed-out accent
 * used for a compare authority everywhere else, so two authorities can sit
 * as adjacent rows per category without a legend to look up. */
function renderHBarChart(figId, caption, entries, unit) {
  const fig = el(figId);
  if (!entries.length) { fig.innerHTML = `<figcaption>${esc(caption)}</figcaption><p class="acc-hint">אין נתונים להצגה.</p>`; return; }
  const peak = Math.max(...entries.map((e) => e.value));
  const rows = entries.map((e) => `
    <div class="acc-hbar${e.compare ? ' acc-hbar-compare' : ''}" title="${esc(e.label)}: ${num(e.value)} ${esc(unit)}">
      <span class="acc-hbar-y" dir="auto">${esc(e.label)}</span>
      <div class="acc-hbar-track"><div class="acc-hbar-fill" style="inline-size:${peak ? (e.value / peak) * 100 : 0}%"></div></div>
      <span class="acc-hbar-v">${num(e.value)}</span>
    </div>`).join('');
  fig.innerHTML = `<figcaption>${esc(caption)}</figcaption><div class="acc-hbars">${rows}</div>`;
}

/* ---------- grouped bar chart with an optional "compare" backdrop ----------
 * Two series (labels.front/back) per x-axis point, plus an optional second
 * entity's own two series drawn as a third, distinctly-colored bar group -
 * local-finance.html's revenue/expense-per-authority chart, reused as-is by
 * welfare.html's payments-per-authority chart. */

// Identity color for the "main" vs "compare" entity - solid accent for main,
// a grayed-out tint of the same accent for compare, used identically in
// every chart AND table row that needs to say "which city/entity is this"
// without a legend the reader has to look up chart-to-chart.
const CITY_COLOR_MAIN = 'var(--accent)';
const CITY_COLOR_COMPARE = 'color-mix(in srgb, var(--accent) 55%, var(--bg) 45%)';
const citySwatchCell = (name, color) => `<td><span class="acc-legend-swatch" style="background:${color}"></span>${esc(name)}</td>`;

const FIN_PLOT_PX = 200; // shared by bar heights, gridline spacing and axis labels - must stay one constant so all three line up

/** Rounds a peak value up to a "nice" axis maximum (1/2/2.5/5 x 10^n steps) -
 *  a gridline at 683,417 would tell a reader nothing an unlabeled bar didn't
 *  already; a gridline at 700,000 does. */
function niceAxisStep(max, targetSteps = 5) {
  if (!max || max <= 0) return { step: 1, steps: 1, axisMax: 1 };
  const roughStep = max / targetSteps;
  const magnitude = 10 ** Math.floor(Math.log10(roughStep));
  const residual = roughStep / magnitude;
  const niceResidual = residual <= 1 ? 1 : residual <= 2 ? 2 : residual <= 2.5 ? 2.5 : residual <= 5 ? 5 : 10;
  const step = niceResidual * magnitude;
  const steps = Math.ceil(max / step);
  return { step, steps, axisMax: step * steps };
}

/** Splits a point series into real years and internal gap runs (a year
 *  between the earliest and latest point that has no data of its own) - a
 *  gap gets its own dashed slot on the chart; years outside the covered span
 *  simply don't appear, since there's no "gap" to mark at the edge of what
 *  the series covers in the first place. A series with no internal gaps
 *  (welfare.html's authority data, checked directly) just returns one slot
 *  per point, same as not having this step at all. */
function buildYearSlots(points) {
  const years = points.map((p) => p.year);
  const minYear = Math.min(...years);
  const maxYear = Math.max(...years);
  const present = new Set(years);
  const slots = [];
  let gapFrom = null;
  for (let y = minYear; y <= maxYear; y++) {
    if (present.has(y)) {
      if (gapFrom != null) { slots.push({ type: 'gap', from: gapFrom, to: y - 1 }); gapFrom = null; }
      slots.push({ type: 'year', year: y });
    } else if (gapFrom == null) {
      gapFrom = y;
    }
  }
  return slots;
}

/**
 * `points`: [{ year, revenue, expense }] for the main entity (`revenue`/
 * `expense` are just the front/back series' values - the names are
 * historical, from local-finance.html's original use, and don't imply money
 * on every page: welfare.html plots recipient-category ₪ through the same
 * two fields).
 *
 * `mainName` (nullable): the main entity's own label, shown in the legend
 * and every group's hover title. Null when the chart has no single named
 * subject (welfare.html's national trend, summed across all authorities) -
 * the legend then shows just the series labels with no name prefix.
 *
 * `compare` (optional): { name, points } - a second entity's own two
 * series, drawn as a third, distinctly-colored bar group per year purely
 * for scale/comparison. Keyed by year, not assumed to line up positionally
 * with `points` - the two entities can easily cover different years.
 *
 * Color encodes WHICH ENTITY (main vs compare), not which series - which of
 * the two series a bar is (front vs back) is carried by position (front
 * always first) and a lighter tint of that entity's own color, not a second
 * hue. When `compare` is set, each year also gets a small "X% מ-<name>"
 * label: the main entity's total (front+back) as a percentage of compare's
 * same total.
 */
function renderGroupedChart(figId, caption, points, unit, mainName, labels = { front: 'הכנסות', back: 'הוצאות' }, compare = null) {
  const fig = el(figId);
  if (!points.length) { fig.innerHTML = `<figcaption>${esc(caption)}</figcaption><p class="acc-hint">אין נתונים להצגה.</p>`; return; }
  const compareByYear = new Map((compare?.points || []).map((p) => [p.year, p]));
  const peak = Math.max(
    ...points.flatMap((p) => [p.revenue, p.expense]),
    ...[...compareByYear.values()].flatMap((p) => [p.revenue, p.expense]),
  );
  const { steps, axisMax } = niceAxisStep(peak);
  const byYear = new Map(points.map((p) => [p.year, p]));
  const slots = buildYearSlots(points);

  const barH = (v) => (axisMax ? Math.round((v / axisMax) * FIN_PLOT_PX) : 0);
  const cityBars = (p, mainEntity) => `
    <div class="fin-chart-bars">
      <div class="fin-chart-bar${mainEntity ? '' : ' fin-chart-bar-compare'}" style="block-size:${barH(p.revenue)}px"></div>
      <div class="fin-chart-bar fin-chart-bar-light${mainEntity ? '' : ' fin-chart-bar-compare'}" style="block-size:${barH(p.expense)}px"></div>
    </div>`;

  const groups = slots.map((slot) => {
    if (slot.type === 'gap') {
      const label = slot.from === slot.to ? String(slot.from) : `${slot.from}-${slot.to}`;
      return `
        <div class="fin-chart-group" title="אין נתונים לשנים ${esc(label)}">
          <div class="fin-chart-gap-box" style="block-size:${FIN_PLOT_PX}px"></div>
          <span class="fin-chart-y fin-chart-gap-label">${esc(label)}<br>אין נתונים</span>
        </div>`;
    }
    const p = byYear.get(slot.year);
    const cmp = compareByYear.get(slot.year);
    const mainTotal = p.revenue + p.expense;
    const cmpTotal = cmp ? cmp.revenue + cmp.expense : null;
    const pct = cmp && cmpTotal ? Math.round((mainTotal / cmpTotal) * 100) : null;
    const title = `${slot.year}${mainName ? ` — ${esc(mainName)}` : ''}: ${esc(labels.front)} ${num(p.revenue)}, ${esc(labels.back)} ${num(p.expense)} ${esc(unit)}`
      + (cmp ? `; ${esc(compare.name)}: ${esc(labels.front)} ${num(cmp.revenue)}, ${esc(labels.back)} ${num(cmp.expense)} ${esc(unit)}` : '');
    return `
      <div class="fin-chart-group" title="${title}">
        <span class="fin-chart-pct">${pct != null ? `${pct}% מ-${esc(compare.name)}` : ''}</span>
        <div class="fin-chart-bars-wrap" style="block-size:${FIN_PLOT_PX}px; background-size:100% ${FIN_PLOT_PX / steps}px">
          ${cityBars(p, true)}
          ${cmp ? cityBars(cmp, false) : ''}
        </div>
        <span class="fin-chart-y">${slot.year}</span>
      </div>`;
  }).join('');

  const axisLabels = Array.from({ length: steps + 1 }, (_, i) => axisMax - i * (axisMax / steps))
    .map((v) => `<span>${num(Math.round(v))}</span>`).join('');

  fig.className = 'acc-chart acc-chart-wide';
  fig.innerHTML = `
    <figcaption>${esc(caption)}</figcaption>
    <div class="acc-legend">
      <span class="acc-legend-item"><span class="acc-legend-swatch" style="background:var(--accent)"></span>${mainName ? `${esc(mainName)} - ` : ''}${esc(labels.front)} (מלא, ראשון) / ${esc(labels.back)} (בהיר, שני)</span>
      ${compare ? `<span class="acc-legend-item"><span class="acc-legend-swatch" style="background:var(--fin-compare)"></span>${esc(compare.name)} - אותו סדר</span>` : ''}
    </div>
    <div class="fin-chart-body">
      <div class="fin-chart-axis">
        <span class="fin-chart-pct">&nbsp;</span>
        <div class="fin-chart-axis-scale" style="block-size:${FIN_PLOT_PX}px">${axisLabels}</div>
      </div>
      <div class="fin-chart-plot">${groups}</div>
    </div>
    <p class="acc-hint">${esc(unit)}${compare && mainName ? ` - האחוז מעל כל שנה: הסה"כ של ${esc(mainName)} כאחוז מהסה"כ של ${esc(compare.name)} אותה שנה` : ''}</p>`;
}

/**
 * Entry point for accidents.html.
 *
 * This app has its own page rather than a slot in the map's portal grid: it
 * isn't a government API in itself (the underlying API is data.gov.il's, and
 * is catalogued under that portal on the map) - it's a thing built on top of
 * one. openPortal() is reused as-is from portal.js in standalone mode, so
 * the live table, search-by-city and CSV download are exactly the same code
 * already exercised on the map, just given a page of its own.
 */





initThemePicker(el('themePick'));

// When this page itself was built/published, distinct from "מחושב" (when the
// data was computed). document.lastModified is the file's Last-Modified - the
// GitHub Pages deploy time when served, the file's mtime when opened offline.
const built = new Date(document.lastModified);
if (!Number.isNaN(built.getTime())) {
  el('created').textContent = `נוצר: ${probedAt(document.lastModified)}`;
  el('created').title = built.toISOString();
}

/**
 * Severity counts by year, computed once against the live DataStore (all
 * 49,941 records across the five per-year resources, paginated past the
 * API's 10,000-row page cap) rather than recalculated in-browser on every
 * visit - the same "snapshot fact, dated" pattern as the about/notes text
 * elsewhere in apis.json. See apps[].computed_at for when.
 */
const YEAR_STATS = {
  all:  { fatal: 1684, severe: 11253, light: 37004, total: 49941 },
  2024: { fatal: 405, severe: 2452, light: 5458, total: 8315 },
  2023: { fatal: 338, severe: 2374, light: 6120, total: 8832 },
  2022: { fatal: 319, severe: 2320, light: 7765, total: 10404 },
  2021: { fatal: 336, severe: 2208, light: 9010, total: 11554 },
  2020: { fatal: 286, severe: 1899, light: 8651, total: 10836 },
};

/**
 * CITY_ROWS (src/city-stats.js) packs each settlement flat to stay small;
 * unpack it here into the {fatal,severe,light,total} shape the tiles and the
 * table read, and sum the all-years figures once. Same dated snapshot as
 * YEAR_STATS - its per-city sums validate against the national totals above -
 * so it is dated by the very same apps[].computed_at, not a second live query.
 * SEMEL_YISHUV code -> { name, all-years total, per-year totals }.
 */
const CITY_STATS = {};
for (const [code, row] of Object.entries(CITY_ROWS)) {
  const years = {};
  const all = { fatal: 0, severe: 0, light: 0, total: 0 };
  CITY_YEARS.forEach((y, i) => {
    const fatal = row[1 + i * 3], severe = row[2 + i * 3], light = row[3 + i * 3];
    years[y] = { fatal, severe, light, total: fatal + severe + light };
    all.fatal += fatal; all.severe += severe; all.light += light;
    all.total += years[y].total;
  });
  CITY_STATS[code] = { name: row[0], all, years };
}

// Typed city name -> its code, for the autocomplete lookup. Settlement names
// are unique in the source list; a later duplicate would just win, harmlessly.
const CITY_BY_NAME = new Map(
  Object.entries(CITY_STATS).map(([code, c]) => [c.name, code]));

// Newest year first: a table is read top-down, so the most recent row leads.
const CITY_TABLE_YEARS = ['2024', '2023', '2022', '2021', '2020'];

// A city's all-years totals as the same four tiles the national section uses,
// so "the total for this city" reads in the exact visual vocabulary above it.
function renderCityStats(s) {
  el('cityStats').innerHTML = `
    <div class="stat bad">
      <span class="stat-n">${num(s.fatal)}</span>
      <span class="stat-l">הרוגים (תאונות קטלניות)</span>
    </div>
    <div class="stat warn">
      <span class="stat-n">${num(s.severe)}</span>
      <span class="stat-l">פצועים קשה</span>
    </div>
    <div class="stat ok">
      <span class="stat-n">${num(s.light)}</span>
      <span class="stat-l">פצועים קל</span>
    </div>
    <div class="stat">
      <span class="stat-n">${num(s.total)}</span>
      <span class="stat-l">סה"כ תאונות עם נפגעים</span>
    </div>`;
}

// The per-year breakdown for one city, under its total tiles.
function renderCityTable(city) {
  const rows = CITY_TABLE_YEARS.map((y) => {
    const v = city.years[y];
    return `
      <tr>
        <th scope="row">${y}</th>
        <td>${num(v.fatal)}</td>
        <td>${num(v.severe)}</td>
        <td>${num(v.light)}</td>
        <td>${num(v.total)}</td>
      </tr>`;
  }).join('');
  el('cityTable').innerHTML = `
    <div class="matrix-wrap">
      <table class="matrix">
        <thead>
          <tr>
            <th scope="col">שנה</th>
            <th scope="col">הרוגים</th>
            <th scope="col">פצועים קשה</th>
            <th scope="col">פצועים קל</th>
            <th scope="col">סה"כ</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderCity(code) {
  const city = CITY_STATS[code];
  renderCityStats(city.all);
  renderCityTable(city);
}

// The panel before any city is chosen (and whenever the text isn't yet a whole
// city name): a prompt, not stale numbers from a previous pick.
function showCityPrompt() {
  el('cityStats').innerHTML = '';
  el('cityTable').innerHTML =
    '<p class="acc-hint">התחילו להקליד שם ישוב כדי לראות את הפירוט לפי שנה.</p>';
}

// A hand-rolled suggestion dropdown, not a native <datalist>: the latter's
// popup is drawn by the OS/browser itself and ignores the page's dir="rtl" -
// on Linux/GTK builds of Chrome it shows up left-anchored and LTR regardless
// of the surrounding page, which isn't fixable from CSS. Rendering our own
// <ul> keeps every pixel of it under our styling, RTL included.
const cityInput = el('cityInput');
const cityMenu = el('cityMenu');
// Most-accidents-first (Object insertion order = CITY_ROWS order), same order
// the datalist used to offer suggestions in.
const CITY_LIST = Object.entries(CITY_STATS).map(([code, c]) => ({ code, name: c.name }));
const CITY_MENU_MAX = 8;

let cityMatches = [];
let cityActive = -1;

function closeCityMenu() {
  cityMenu.hidden = true;
  cityMenu.innerHTML = '';
  cityMatches = [];
  cityActive = -1;
  cityInput.setAttribute('aria-expanded', 'false');
  cityInput.removeAttribute('aria-activedescendant');
}

function renderCityMenu() {
  cityMenu.innerHTML = cityMatches.map((c, i) => `
    <li role="option" id="cityopt-${i}" data-code="${c.code}"
        class="${i === cityActive ? 'active' : ''}">${esc(c.name)}</li>`).join('');
  cityMenu.hidden = false;
  cityInput.setAttribute('aria-expanded', 'true');
  if (cityActive >= 0) cityInput.setAttribute('aria-activedescendant', `cityopt-${cityActive}`);
  else cityInput.removeAttribute('aria-activedescendant');
}

function selectCity(code, name) {
  cityInput.value = name;
  renderCity(code);
  closeCityMenu();
}

// Empty by default; only an exact match to a known name resolves - a partial
// string shows the prompt rather than guessing a city.
function onCityInput() {
  const q = cityInput.value.trim();
  const code = CITY_BY_NAME.get(q);
  if (code) renderCity(code);
  else showCityPrompt();

  if (!q) { closeCityMenu(); return; }
  cityMatches = CITY_LIST.filter((c) => c.name.includes(q)).slice(0, CITY_MENU_MAX);
  cityActive = -1;
  if (cityMatches.length) renderCityMenu();
  else closeCityMenu();
}
showCityPrompt();
cityInput.addEventListener('input', onCityInput);

cityInput.addEventListener('keydown', (e) => {
  if (cityMenu.hidden) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    cityActive = Math.min(cityActive + 1, cityMatches.length - 1);
    renderCityMenu();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    cityActive = Math.max(cityActive - 1, 0);
    renderCityMenu();
  } else if (e.key === 'Enter' && cityActive >= 0) {
    e.preventDefault();
    const m = cityMatches[cityActive];
    selectCity(m.code, m.name);
  } else if (e.key === 'Escape') {
    closeCityMenu();
  }
});

// mousedown, not click: it fires before the input's blur, and preventDefault
// here stops that blur from happening at all, so the menu is still there for
// this same handler to read from when the tap/click lands.
cityMenu.addEventListener('mousedown', (e) => {
  const li = e.target.closest('li');
  if (!li) return;
  e.preventDefault();
  selectCity(li.dataset.code, li.textContent);
});

cityInput.addEventListener('blur', closeCityMenu);

// Years oldest→newest in the DOM; on this RTL page the flow lays them out
// right→left, so time reads the same direction as the Hebrew around it -
// oldest (2020) on the right, newest (2024) on the left.
const CHART_YEARS = ['2020', '2021', '2022', '2023', '2024'];

// Two single-series bar charts side by side, each its own hue (fatalities in
// the danger red of the "killed" tile, all accidents in the neutral accent) -
// one series apiece, so no legend, the caption names it. Bars share a zero
// baseline and are labelled directly, so each plot carries its own numbers.
// A picked year lights its bar in both and recedes the rest, echoing the
// dropdown; the two charts stay on the same y-scale is NOT wanted - each is
// keyed to its own peak, since killed and total counts differ by two orders.
function renderChart(figId, caption, unit, valueOf, year) {
  const entries = CHART_YEARS.map((y) => ({ label: y, value: valueOf(y), active: year !== 'all' && year === y }));
  renderBarChart(figId, caption, entries, unit, '', {
    ariaLabel: `${caption}, ${CHART_YEARS[0]}–${CHART_YEARS[CHART_YEARS.length - 1]}`,
  });
}

function renderCharts(year) {
  renderChart('accChartKilled', 'הרוגים לפי שנה', 'הרוגים',
    (y) => YEAR_STATS[y].fatal, year);
  renderChart('accChartTotal', 'מספר התאונות לפי שנה', 'תאונות',
    (y) => YEAR_STATS[y].total, year);
}

function renderStats(year) {
  const s = YEAR_STATS[year] || YEAR_STATS.all;
  el('accStats').innerHTML = `
    <div class="stat bad">
      <span class="stat-n">${num(s.fatal)}</span>
      <span class="stat-l">הרוגים (תאונות קטלניות)</span>
    </div>
    <div class="stat warn">
      <span class="stat-n">${num(s.severe)}</span>
      <span class="stat-l">פצועים קשה</span>
    </div>
    <div class="stat ok">
      <span class="stat-n">${num(s.light)}</span>
      <span class="stat-l">פצועים קל</span>
    </div>
    <div class="stat">
      <span class="stat-n">${num(s.total)}</span>
      <span class="stat-l">סה"כ תאונות עם נפגעים</span>
    </div>`;
}

renderCharts('all');
renderStats('all');
el('accYear').addEventListener('change', (e) => {
  renderCharts(e.target.value);
  renderStats(e.target.value);
});

async function load() {
  const mount = el('accidents');
  try {
    const data = globalThis.__API_DATA__ || await (async () => {
      const res = await fetch(new URL('../apis.json', import.meta.url));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    })();
    const app = data.apps.find((a) => a.id === 'accidents');
    if (!app) throw new Error('accidents app entry not found in apis.json');
    if (app.computed_at) {
      el('computed').textContent = `מחושב: ${probedAt(app.computed_at)}`;
      el('computed').title = app.computed_at;
    }
    await openPortal(mount, app, { standalone: true });
  } catch (err) {
    mount.innerHTML = `<div class="notice error">טעינת הנתונים נכשלה: ${esc(err.message)}</div>`;
  }
}

load();

</script>
