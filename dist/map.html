/*

:root {

@media (prefers-color-scheme: dark) {

* { box-sizing: border-box; }

body {

}

}

/* Mixed Hebrew/Latin content reorders incorrectly without per-element dir.
   Anything holding API-sourced text gets dir="auto" in the markup. */
[dir="auto"] { unicode-bidi: plaintext; }

input[type="search"], input[type="text"], select {
  font: inherit;
  padding: .55rem .7rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);

}

.searchbar { display: flex; gap: .5rem; margin-block-end: 1.25rem; }
.searchbar input { flex: 1; }

button {
  font: inherit;
  padding: .55rem .9rem;

}
button:hover:not(:disabled) { border-color: var(--accent); }
button:disabled { opacity: .5; cursor: default; }

.card {

  padding: .9rem 1rem;
  margin-block-end: .75rem;
}
.card h3 { margin: 0 0 .3rem; font-size: 1rem; }

.meta { display: flex; flex-wrap: wrap; gap: .5rem; font-size: .8rem; color: var(--muted); }

}

.notice { padding: .8rem 1rem; border-radius: var(--radius); margin-block-end: 1rem; }
.notice.error { background: color-mix(in srgb, var(--danger) 12%, transparent); border: 1px solid var(--danger); }
.notice.info  { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

.skeleton { color: var(--muted); padding: 2rem 0; }

/* ---------- API map ---------- */

.lead { color: var(--muted); max-inline-size: 62ch; margin-block-end: 1.5rem; }

.controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-block-end: .75rem; }
.controls input[type="search"] { flex: 1; min-inline-size: 15rem; }

#summary { margin-block-end: 1rem; }

.api-head { display: flex; align-items: baseline; gap: .75rem; justify-content: space-between; }

/* Status colour is carried by a text label too, not colour alone. */
.badge {
  font-size: .75rem;
  padding: .15rem .6rem;
  border-radius: 999px;
  white-space: nowrap;

.badge.ok      { color: #1a7f45; border-color: #1a7f45; background: color-mix(in srgb, #1a7f45 10%, transparent); }

.badge.limited { color: #6d4aa8; border-color: #6d4aa8; background: color-mix(in srgb, #6d4aa8 10%, transparent); }

@media (prefers-color-scheme: dark) {

}

/* Left border repeats the verdict for scanning down the list. */
.card.api { border-inline-start-width: 3px; }
.card.api.ok   { border-inline-start-color: #1a7f45; }
.card.api.warn { border-inline-start-color: #9a6700; }
.card.api.bad  { border-inline-start-color: var(--danger); }
.card.api.limited { border-inline-start-color: #6d4aa8; }

/* ---------- top view ---------- */

.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
  gap: .6rem;
  margin-block-end: 1rem;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: .15rem;
  text-align: start;
  padding: .7rem .85rem;
  border: 1px solid var(--border);
  border-inline-start-width: 3px;
  border-radius: var(--radius);
  background: var(--bg);
}
button.stat { cursor: pointer; }
.stat-n { font-size: 1.6rem; font-weight: 600; line-height: 1.1; font-variant-numeric: tabular-nums; }
.stat-l { font-size: .8rem; color: var(--muted); }

.stat.ok      { border-inline-start-color: #1a7f45; }
.stat.warn    { border-inline-start-color: #9a6700; }
.stat.limited { border-inline-start-color: #6d4aa8; }
.stat.bad     { border-inline-start-color: var(--danger); }
.stat.unknown { border-inline-start-color: var(--muted); }
.stat.active  { background: var(--surface); box-shadow: inset 0 0 0 1px var(--accent); }

/* The table is the widest thing on the page; it scrolls, the body never does. */
.matrix-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }

.matrix { border-collapse: collapse; inline-size: 100%; font-size: .85rem; }
.matrix th, .matrix td { padding: .45rem .7rem; text-align: start; white-space: nowrap; }
.matrix thead th {
  font-size: .75rem;
  font-weight: 600;
  color: var(--muted);
  background: var(--surface);
  border-block-end: 1px solid var(--border);
  position: sticky;
  inset-block-start: 0;
}
/* A 50-row preview must not push the rest of the page down: it gets its own
   viewport and scrolls inside it. The sticky thead above keeps the headers -
   and therefore the sort controls - reachable while scrolled. */
.matrix-wrap.scroll { max-block-size: 26rem; overflow-y: auto; }

/* Only columns the server can sort by are interactive - see headCell(). */
.matrix th.sortable { cursor: pointer; user-select: none; }
.matrix th.sortable:hover { color: var(--fg); }
.matrix th.sortable:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--accent); }
.matrix th.sorted { color: var(--accent); }
.s-mark { font-size: .7em; margin-inline-start: .3rem; opacity: .45; }
.matrix th.sorted .s-mark { opacity: 1; }

.matrix tr.grp th {
  font-size: .8rem;
  background: var(--surface);
  border-block: 1px solid var(--border);
}
.grp-sub { font-weight: 400; color: var(--muted); font-size: .75rem; }

.matrix tr.row { cursor: pointer; border-block-end: 1px solid var(--border); }
.matrix tr.row:hover, .matrix tr.row:focus-visible { background: var(--surface); outline: none; }
.matrix tr.row:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); }
.matrix tr.row td:first-child { border-inline-start: 3px solid transparent; font-weight: 500; }
.matrix tr.row.ok      td:first-child { border-inline-start-color: #1a7f45; }
.matrix tr.row.warn    td:first-child { border-inline-start-color: #9a6700; }
.matrix tr.row.limited td:first-child { border-inline-start-color: #6d4aa8; }
.matrix tr.row.bad     td:first-child { border-inline-start-color: var(--danger); }
.matrix tr.row.unknown td:first-child { border-inline-start-color: var(--border); }

/* Jump target needs to announce itself - the card is mid-page and looks like its neighbours. */
.card.api.flash { background: color-mix(in srgb, var(--accent) 10%, transparent); transition: background .4s; }

/* ---------- portal grid ---------- */

.section { font-size: 1rem; margin-block: 2rem .75rem; color: var(--muted); font-weight: 600; }
.section:first-of-type { margin-block-start: 0; }

.portal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(15rem, 1fr));
  gap: .75rem;
}

.portal {
  display: flex;
  flex-direction: column;
  gap: .35rem;
  text-align: start;
  padding: .85rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  cursor: pointer;
}
.portal:hover { border-color: var(--accent); }
.portal.active { border-color: var(--accent); background: var(--surface); box-shadow: inset 0 0 0 1px var(--accent); }

.p-head { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
.p-name { font-weight: 600; }
.p-sub  { font-size: .78rem; color: var(--muted); }
.p-about { font-size: .85rem; color: var(--muted); line-height: 1.45; }

/* ---------- "continue" disclosure past the portals ----------
   Native <details>/<summary>: no JS toggle to write or keep accessible,
   the browser already handles open/closed and keyboard use. The `open`
   attribute ships in the markup so desktop (and no-JS/no-CSS clients)
   just see the full page; only the mobile media query below closes it
   by default and gives the summary a tap target worth pressing. */
.more summary.more-toggle {
  list-style: none;
  cursor: pointer;
  color: var(--accent);
  font-weight: 600;
  font-size: .9rem;
  margin-block: .5rem 1.25rem;
}
.more summary.more-toggle::-webkit-details-marker { display: none; }
.more[open] summary.more-toggle { display: none; }

/* ---------- live explorer ---------- */

.toggle-ex { font-size: .85rem; padding: .35rem .7rem; margin-block-start: .5rem; }

.explorer {
  margin-block-start: .75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .7rem;
  background: var(--surface);
}
.ex-bar { display: flex; gap: .4rem; align-items: stretch; flex-wrap: wrap; }
.ex-method {
  font-size: .78rem; font-weight: 600;

}
.ex-method:hover { border-color: var(--accent); }

.ex-url { flex: 1; min-inline-size: 12rem; font-family: ui-monospace, Menlo, monospace; font-size: .8rem; }
.ex-status { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; margin-block: .6rem .4rem; }

.ex-out pre {
  margin: 0;
  max-block-size: 22rem;
  overflow: auto;              /* long responses scroll inside the panel */
  background: var(--bg);
  border: 1px solid var(--border);

  font-size: .78rem;

.j-key  { color: var(--accent); }
.j-str  { color: #1a7f45; }
.j-num  { color: #9a6700; }

@media (prefers-color-scheme: dark) {
  .j-str { color: #5fce8f; }
  .j-num { color: #e0b341; }
}

/* Endpoints are LTR inside an RTL page; they must scroll, not widen it. */
.endpoint { overflow-x: auto; }
.endpoint code {
  font-size: .82rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: .15rem .4rem;
  white-space: nowrap;
}

/* ---------- data.gov.il explorer ---------- */

.ckan { border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.ckan .lead { margin-block-start: 0; font-size: .92rem; }

.ck-crumbs { display: flex; flex-wrap: wrap; align-items: center; gap: .35rem; margin-block-end: .8rem; font-size: .85rem; }
.ck-crumb {
  font: inherit; font-size: .85rem; padding: .15rem .4rem; cursor: pointer;
  color: var(--accent); background: none; border: none; border-radius: 4px; text-decoration: underline;
}
.ck-crumb:hover { background: var(--surface); }
.ck-here { color: var(--muted); }
.ck-sep { color: var(--muted); }

.ck-controls { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-block-end: .6rem; }
.ck-controls input[type="search"] { flex: 1 1 14rem; font-size: .9rem; padding: .45rem .65rem; }
.ck-controls input[type="search"]:disabled { opacity: .5; cursor: not-allowed; }
.ck-controls select {
  font: inherit; font-size: .82rem; padding: .35rem .5rem; max-inline-size: 100%;
  color: var(--fg); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
}
.ck-count { font-size: .85rem; color: var(--muted); margin-block-end: .6rem; }

/* min(17rem, 100%) rather than a bare 17rem: below a 17rem viewport the track
   would otherwise stay 17rem wide and push the page sideways. */
.ck-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(17rem, 100%), 1fr)); gap: .6rem; }
.ck-card {
  display: flex; flex-direction: column; gap: .3rem; text-align: start; cursor: pointer;
  padding: .7rem .8rem; font: inherit;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  /* A `1fr` track floors at min-content, so one long unbroken string in a title
     or description widens the track past the viewport and scrolls the whole
     page - measured at 85px over on a 380px screen. These two lines are what
     stop dataset text from dictating the layout. */
  min-inline-size: 0;
  overflow-wrap: anywhere;
}
.ck-card:hover { background: var(--surface); border-color: var(--accent); }
.ck-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.ck-title { font-weight: 600; font-size: .92rem; }
.ck-org { font-size: .78rem; color: var(--muted); }
.ck-notes { font-size: .8rem; color: var(--muted); line-height: 1.4; }
.ck-meta { display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; margin-block-start: .2rem; }
.ck-n { font-size: .72rem; color: var(--muted); }

.ck-detail h3 { margin-block: 0 .6rem; font-size: 1.05rem; }
.ck-detail h4 { margin-block: 1.2rem .5rem; font-size: .9rem; color: var(--muted); }
.ck-facts { display: grid; grid-template-columns: auto 1fr; gap: .25rem .8rem; margin: 0 0 .8rem; font-size: .85rem; }
.ck-facts dt { color: var(--muted); }
.ck-facts dd { margin: 0; }
.ck-desc { font-size: .88rem; line-height: 1.6; white-space: pre-wrap; }
.ck-tags { display: flex; flex-wrap: wrap; gap: .3rem; }
.ck-open {
  font: inherit; font-size: .76rem; padding: .2rem .55rem; cursor: pointer;
  color: var(--bg); background: var(--accent); border: 1px solid var(--accent); border-radius: 999px;
}
.ck-open:hover { filter: brightness(1.1); }
.ck-nodata { font-size: .72rem; color: var(--muted); }
/* Built in the browser from the DataStore, so it actually produces a file -
   unlike the resource's own URL, which the WAF answers with a challenge page. */
.ck-dl {
  font: inherit; font-size: .76rem; padding: .2rem .55rem; cursor: pointer; white-space: nowrap;
  color: var(--accent); background: var(--bg); border: 1px solid var(--accent); border-radius: 999px;
}
.ck-dl:hover:not(:disabled) { background: var(--surface); }
.ck-dl:disabled { opacity: .6; cursor: progress; }

/* The record table: one column per field, so it is wide by nature. */
.ck-rec th { vertical-align: top; }
.ck-type { display: block; font-size: .65rem; font-weight: 400; color: var(--muted); }
.ck-fil th { padding: .25rem .35rem; background: var(--surface); position: sticky; inset-block-start: 3.1rem; }
.ck-fil input {
  inline-size: 100%; min-inline-size: 6rem; font: inherit; font-size: .75rem; padding: .2rem .35rem;
  color: var(--fg); background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
}
.ck-rec tbody td { border-block-end: 1px solid var(--border); max-inline-size: 22rem; overflow: hidden; text-overflow: ellipsis; }

/* ---------- portal drill-in ---------- */

.p-open { font-size: .8rem; color: var(--accent); margin-block-start: .2rem; }

.drill {
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: .9rem 1rem;
  margin-block: 1rem 0;
  background: var(--surface);
}
.drill-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
.drill-head h2 { font-size: 1.05rem; margin: 0; }
.drill-close { font-size: .8rem; padding: .25rem .6rem; }
.drill-sub { font-size: .85rem; color: var(--muted); margin-block: .2rem .6rem; }

/* The request is shown so the result can be reproduced outside the page. */
/* The preview stops at the catalogue; this points at the page that does not. */
/* No color rule here used to mean "whatever the browser's default link
   color is" - fine on a white desktop background, but the mobile theme's
   near-black bg turned that default (a dark visited-link purple) almost
   unreadable. Same accent as every other link on the page. */
.drill-more { margin-inline-start: .5rem; font-size: .8rem; white-space: nowrap; color: var(--accent); }

.drill-url { margin-block: .6rem 0; overflow-x: auto; }
.drill-url code { font-size: .74rem; color: var(--muted); white-space: nowrap; }

/* Preview tables hold prose, unlike the API matrix - let long values wrap
   inside a bounded cell instead of stretching the table off-screen. */
.matrix.preview td { white-space: normal; max-inline-size: 22rem; }
.matrix.preview td.ident { font-weight: 500; }
.matrix.preview tbody tr:nth-child(even) { background: color-mix(in srgb, var(--fg) 3%, transparent); }

/* Filter box inside a portal drill-in. */
.drill-filter { display: flex; gap: .5rem; align-items: center; margin-block-end: .7rem; }
/* Offset paging. Server-side `start`, so these move through the whole result
   set rather than through what was already fetched. */
.pager { display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; margin-block-start: .7rem; }
.pager .pg {
  font: inherit;
  font-size: .82rem;
  padding: .25rem .6rem;
  min-inline-size: 2.2rem;
  color: var(--fg);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
}
.pager .pg:hover:not(:disabled) { background: var(--surface); }
.pager .pg:disabled { color: var(--muted); cursor: default; opacity: .55; }
.pager .pg.cur {
  color: var(--bg);
  background: var(--accent);
  border-color: var(--accent);
  font-weight: 600;
}
.pg-gap { color: var(--muted); padding-inline: .1rem; }

/* Column filters. Each is one fq clause, so they compose with the search box. */
.drill-cols { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-block-end: .7rem; }
.drill-cols select {
  font: inherit;
  font-size: .82rem;
  padding: .3rem .5rem;
  max-inline-size: 100%;
  color: var(--fg);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.drill-filter input[type="search"] { flex: 1; font-size: .9rem; padding: .45rem .65rem; }
/* Server-side vs local is not cosmetic: it says whether you are searching the
   whole collection or only the rows already fetched. */
.drill-scope {
  font-size: .72rem;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: .15rem .55rem;
  white-space: nowrap;
}

/* Expandable rows: a dataset opens into its downloadable files. */
.matrix.preview.expandable tr.has-files { cursor: pointer; }
.matrix.preview.expandable tr.has-files:hover,
.matrix.preview.expandable tr.has-files:focus-visible { background: var(--surface); outline: none; }
.matrix.preview.expandable tr.has-files:focus-visible { box-shadow: inset 0 0 0 2px var(--accent); }
.matrix.preview .c-x { inline-size: 1.6rem; text-align: center; }
.x-mark { color: var(--muted); font-size: .8rem; }
.matrix.preview tr.files-row td { background: var(--surface); padding: .5rem .7rem; }

.files { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .3rem; }
.files a {
  display: flex; align-items: center; gap: .6rem;
  padding: .4rem .6rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  text-decoration: none;
  color: var(--fg);
  font-size: .85rem;
}
.files a:hover { border-color: var(--accent); }
/* Format first and size up front: one of these is a 9 MB CSV. */
.f-fmt {
  font-size: .7rem; font-weight: 600; color: var(--accent);
  border: 1px solid var(--accent); border-radius: 4px;
  padding: .05rem .35rem; min-inline-size: 3rem; text-align: center;
}
.f-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.f-size { color: var(--muted); font-size: .78rem; white-space: nowrap; }
.f-tag {
  font-size: .68rem; color: var(--muted);
  border: 1px solid var(--border); border-radius: 999px; padding: .05rem .45rem;
  white-space: nowrap;
}
.f-go { color: var(--accent); }
.files-note { font-size: .76rem; color: var(--muted); margin-block: .45rem 0; }
.slow-note { display: block; font-size: .78rem; color: var(--muted); margin-block-start: .25rem; }

/* ---------- mobile: maison ----------
   Below 640px the palette variables flip to black/ivory/gold - since almost
   every rule above already reads color from var(), that swap alone restyles
   badges, borders and buttons. What's added here is the couture-specific
   part: a serif for headlines, tracked uppercase for UI chrome, and a gold
   sheen (an animated gradient on text, a sweep on button hover/tap - :active
   stands in for hover on touch) so the surface reads premium, not just dark. */
@media (max-width: 640px) {
  :root {
    --bg: #0d0b08;
    --fg: #f3ecdc;
    --muted: #b7a67f;
    --border: #3c3320;
    --accent: #ddb44f;
    --surface: #18140d;
    --danger: #d2685a;
    --radius: 3px;
    --font-display: Georgia, "David", "Times New Roman", serif;
  }

  body { letter-spacing: .01em; }

  /* Section titles and card/portal names carry the "fashion editorial"
     voice: serif, tracked, quiet weight. Everything that is UI chrome
     (buttons, tags, labels) stays sans but gains the same tracking instead -
     that split is what a fashion-house site actually looks like. */
  header.site h1,
  .section,
  .card h3, .card h3 a,
  .p-name, .ck-title,
  .drill-head h2,
  .ck-detail h3 {
    font-family: var(--font-display);
    font-weight: 400;
    letter-spacing: .03em;
  }

  header.site {
    background: radial-gradient(120% 140% at 20% 0%, color-mix(in srgb, var(--accent) 10%, var(--surface)), var(--bg) 65%);
    border-block-end: 1px solid var(--border);
    box-shadow: 0 1px 0 color-mix(in srgb, var(--accent) 25%, transparent);
  }
  header.site h1 {
    font-size: 1.3rem;
    text-transform: uppercase;
    letter-spacing: .16em;
    background: linear-gradient(100deg, var(--accent) 0%, #fff6dc 22%, var(--accent) 45%, var(--muted) 65%, var(--accent) 85%);
    background-size: 250% auto;
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    animation: fh-shine 7s ease-in-out infinite;
  }
  header.site a { text-transform: uppercase; font-size: .72rem; letter-spacing: .08em; }

  .section {
    display: flex; align-items: center; gap: .7rem;
    text-transform: uppercase; font-size: .8rem; letter-spacing: .18em; font-weight: 400;
    color: var(--muted);
  }
  .section::after { content: ''; flex: 1; block-size: 1px; background: var(--border); }

  @keyframes fh-shine {
    0%, 100% { background-position: 220% 0; }
    50%      { background-position: -60% 0; }
  }

  /* Hairline borders + a soft gold lift on the surfaces that matter -
     cards, portals, stat tiles, the explorer panel. Status colour on the
     leading edge (.card.api, .stat, tr.row) is left alone: it's the one
     thing on the page carrying meaning, not decoration. */
  .card, .portal, .stat, .ckan, .explorer, .drill, .matrix-wrap, .ck-card {
    background: linear-gradient(180deg, var(--surface), var(--bg));
    border-color: var(--border);
  }
  .portal:hover, .ck-card:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 20px -12px color-mix(in srgb, var(--accent) 70%, transparent);
  }
  .portal.active, .stat.active {
    box-shadow: inset 0 0 0 1px var(--accent), 0 0 16px -6px color-mix(in srgb, var(--accent) 60%, transparent);
  }

  .tag, .badge, .drill-scope, .ck-n, .f-tag {
    text-transform: uppercase;
    letter-spacing: .05em;
    font-size: .7rem;
  }
  .badge.ok { box-shadow: 0 0 10px -4px color-mix(in srgb, #5fce8f 70%, transparent); }

  /* Buttons: tracked uppercase, thin gold hairline, a sheen that sweeps on
     hover for a mouse and on :active for a thumb - a touch has no hover. */
  button, .ex-method, .ck-crumb {
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    letter-spacing: .07em;
    font-size: .78rem;
  }
  button::after, .ex-method::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(115deg, transparent 30%, color-mix(in srgb, var(--accent) 55%, transparent) 50%, transparent 70%);
    background-size: 250% 100%;
    background-position: 150% 0;
    transition: background-position .7s ease;
    pointer-events: none;
  }
  button:hover:not(:disabled)::after, button:active:not(:disabled)::after,
  .ex-method:hover::after, .ex-method:active::after { background-position: -50% 0; }

  button:hover:not(:disabled), button:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 4px 16px -10px color-mix(in srgb, var(--accent) 70%, transparent);
  }

  .ck-open, .ck-dl, .pager .pg.cur {
    border-color: var(--accent);
    box-shadow: 0 4px 14px -8px color-mix(in srgb, var(--accent) 65%, transparent);
  }

  input[type="search"], input[type="text"], select {
    background: color-mix(in srgb, var(--surface) 70%, var(--bg));
  }
  input[type="search"]:focus, input[type="text"]:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .lead { font-family: var(--font-display); font-size: 1rem; line-height: 1.7; }

  .wrap { padding-block: 1.75rem 4.5rem; }
  .section { margin-block: 2.5rem 1rem; }

  /* The one button on the page meant to be found without scrolling first -
     full-width, gold-filled rather than outlined, so it reads as the next
     step rather than one option among the portal cards above it. */
  .more summary.more-toggle {
    display: block;
    text-align: center;
    background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 80%, #000));
    color: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: .75rem 1rem;
    margin-block: 1.5rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    font-size: .8rem;
  }
}

/* ---------- desktop: legible by default ----------
   Nothing above this touched desktop - the plain look was it. The ask here
   is specifically for older readers, and it's the opposite move from the
   mobile section above: bigger type, stronger contrast, roomier click
   targets, nothing decorative. "Simple to see" ruled out matching the
   mobile treatment on purpose - this is legibility, not a style. */
@media (min-width: 641px) {
  body { font-size: 1.15rem; line-height: 1.65; }

  :root { --muted: #454a54; }
}
@media (min-width: 641px) and (prefers-color-scheme: dark) {
  :root { --muted: #c3c8cf; }
}

@media (min-width: 641px) {
  h1 { font-size: 1.35rem; }
  .section { font-size: 1.1rem; }

  button, input[type="search"], input[type="text"], select {
    font-size: 1rem;
    padding: .75rem 1rem;
  }

  .card, .portal, .stat { padding: 1.1rem 1.3rem; }
  .portal-grid, .stat-row { gap: 1rem; }
  .stat-n { font-size: 1.85rem; }
  .stat-l { font-size: .9rem; }

  .tag, .badge { font-size: .82rem; padding: .2rem .7rem; }

  .matrix th, .matrix td { padding: .65rem .9rem; font-size: .95rem; }

  a:focus-visible, button:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
}
</style>
</head>

/** Shared DOM helpers. */

const el = (id) => document.getElementById(id);

/* Shared by every renderer. They live here rather than in one module because
   bundle.py flattens all sources into a single scope - a second `const num`
   anywhere would be a redeclaration, not a shadow. */

const num = (v) => (v == null ? '—' : Number(v).toLocaleString('he-IL'));

/** Bytes -> a size someone can judge a download by. */
function bytes(n) {
  if (n == null || Number.isNaN(Number(n))) return '';
  const u = ['B', 'KB', 'MB', 'GB'];
  let v = Number(n), i = 0;
  while (v >= 1024 && i < u.length - 1) { v /= 1024; i += 1; }
  return `${v.toFixed(v < 10 && i ? 1 : 0)} ${u[i]}`;
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  })[c]);
}

/** Renders CkanError.kind as something a user can act on. */
function showError(node, err) {
  const messages = {
    blocked:
      'החסימה מגיעה מ-data.gov.il (403). נסה שוב בעוד מספר דקות.',
    rate_limit: 'יותר מדי בקשות. ממתין ומנסה שוב…',
    network: 'שגיאת רשת. בדוק את החיבור לאינטרנט.',
  };
  const hint = messages[err?.kind] || err?.message || 'אירעה שגיאה.';
  node.innerHTML = `<div class="notice error" dir="auto">${esc(hint)}</div>`;
  if (err) console.error(err);
}

function showInfo(node, text) {
  node.innerHTML = `<div class="notice info" dir="auto">${esc(text)}</div>`;
}

function showLoading(node, text = 'טוען…') {
  node.innerHTML = `<div class="skeleton" dir="auto">${esc(text)}</div>`;
}

const clear = (node) => { node.innerHTML = ''; };

const param = (name) => new URLSearchParams(location.search).get(name);

/** Debounce for search-as-you-type without hammering the API. */
function debounce(fn, ms = 300) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}

/**
 * Live API browser.
 *
 * Issues the request straight from the page. That is the point: for a
 * CORS-blocked API the failure IS the demonstration, so failures are reported
 * precisely rather than swallowed.
 */

const MAX_RENDER = 400_000; // don't try to pretty-print a 10 MB body

/**
 * A cross-origin block surfaces as an opaque TypeError with no status - the
 * browser refuses to expose the response. Distinguish that from a real network
 * failure so the message isn't misleading.
 */
function describeFailure(err, api) {
  if (err.name === 'AbortError') return 'הבקשה בוטלה (timeout).';
  if (err instanceof TypeError) {
    return api && !api.cors
      ? 'הבקשה נחסמה על ידי הדפדפן (CORS). ל-API הזה אין כותרת Access-Control-Allow-Origin, ' +
        'ולכן לא ניתן לקרוא לו מדף סטטי — נדרש proxy או שליפה בזמן build.'
      : 'הבקשה נכשלה: חסימת CORS או תקלת רשת. הדפדפן לא חושף את הסיבה המדויקת.';
  }
  return err.message;
}

function highlight(text) {
  // Minimal JSON colouring; escaped first, so this only ever wraps safe text.
  return esc(text)
    .replace(/(&quot;[^&]*?&quot;)(\s*:)/g, '<span class="j-key">$1</span>$2')
    .replace(/:\s*(&quot;.*?&quot;)/g, ': <span class="j-str">$1</span>')
    .replace(/:\s*(-?\d+\.?\d*)/g, ': <span class="j-num">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="j-bool">$1</span>');
}

function renderBody(text, ctype) {
  if (text.length > MAX_RENDER) {
    return `<pre dir="ltr">${esc(text.slice(0, MAX_RENDER))}\n\n… (${text.length.toLocaleString()} תווים, נחתך)</pre>`;
  }
  if (/json/.test(ctype)) {
    try {
      return `<pre dir="ltr">${highlight(JSON.stringify(JSON.parse(text), null, 2))}</pre>`;
    } catch { /* fall through to raw */ }
  }
  return `<pre dir="ltr">${esc(text)}</pre>`;
}

/** Builds the try-it panel for one API and wires it up. */
function attachExplorer(container, api) {
  container.innerHTML = `
    <div class="explorer">
      <div class="ex-bar">
        ${api.method === 'GET'
          ? `<a class="ex-method" target="_blank" rel="noopener"
               href="${esc(api.example || api.endpoint)}"
               title="פתח את הבקשה בלשונית חדשה">${esc(api.method)} ↗</a>`
          // A new tab can only issue GET. Offering it for a POST endpoint would
          // send a different request than the one shown and call it the same.
          : `<span class="ex-method static"
               title="לא ניתן לפתוח בלשונית — הדפדפן ישלח GET במקום ${esc(api.method)}"
               >${esc(api.method)}</span>`}
        <input type="text" class="ex-url" dir="ltr" value="${esc(api.example || api.endpoint)}"
               spellcheck="false" aria-label="כתובת הבקשה">
        <button class="ex-run" type="button">בקשה</button>
      </div>
      <div class="ex-out" aria-live="polite"></div>
    </div>`;

  const urlInput = container.querySelector('.ex-url');
  const btn = container.querySelector('.ex-run');
  const out = container.querySelector('.ex-out');
  const openLink = container.querySelector('.ex-method');

  // The method badge used to be a dead span that looked clickable. It is now the
  // "open the raw response in a new tab" affordance, which is the only way to
  // see a response the page itself cannot read - a server-only API returns an
  // opaque TypeError to fetch() but renders fine in its own tab.
  if (openLink?.tagName === 'A') {
    urlInput.addEventListener('input', () => {
      const url = urlInput.value.trim();
      openLink.href = url || '#';
      openLink.classList.toggle('disabled', !url);
    });
  }

  async function send() {
    const url = urlInput.value.trim();
    if (!url) return;

    btn.disabled = true;
    out.innerHTML = '<div class="skeleton">שולח…</div>';

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 20000);
    const t0 = performance.now();

    try {
      const res = await fetch(url, { signal: ctrl.signal, headers: { Accept: 'application/json,*/*' } });
      const text = await res.text();
      const ms = Math.round(performance.now() - t0);
      const ctype = res.headers.get('content-type') || '';
      const ok = res.ok ? 'ok' : 'bad';

      out.innerHTML = `
        <div class="ex-status">
          <span class="badge ${ok}">HTTP ${res.status}</span>
          <span class="tag">${ms} ms</span>
          <span class="tag" dir="ltr">${esc(ctype.split(';')[0] || '—')}</span>
          <span class="tag">${text.length.toLocaleString()} תווים</span>
        </div>
        ${renderBody(text, ctype)}`;
    } catch (err) {
      out.innerHTML = `<div class="notice error" dir="auto">${esc(describeFailure(err, api))}</div>`;
    } finally {
      clearTimeout(timer);
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', send);
  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); send(); }
  });
}

 *
 * There is no generic parser here on purpose. Every source returns a different
 * shape - CKAN packages, nested CBS series, flat GTFS rows, GeoJSON features,
 * ArcGIS attribute records - so each gets a small explicit renderer. A generic
 * "dump any JSON as a table" would technically work and would be unreadable for
 * four of the five.
 *
 * Endpoints and shapes were probed on 2026-07-20; the weekly prober watches
 * them, so if one changes the map reports it rather than this quietly breaking.

 * One entry per browser-callable portal.

 *             client-side filter over GovMap would search 15 of 1,097,502 parcels.
 *   local   - set instead when the collection is small enough to arrive whole
 *             (CBS is 14 chapters) and filtering client-side is honest.
 *   total   - how many records exist overall, when the API says so

      + '&returnGeometry=false&orderByFields=last_update_date%20DESC&resultRecordCount=15&f=json',
    unit: 'תכניות',
    columns: [['number', 'מספר תכנית'], ['name', 'שם'], ['area', 'שטח'], ['juris', 'תחום שיפוט']],
    rows: (j) => (j.features || []).map((f) => ({
      number: f.attributes.pl_number || '—',
      name: f.attributes.pl_name || '—',
      area: f.attributes.pl_area_dunam == null ? '—'
        : `${Number(f.attributes.pl_area_dunam).toLocaleString('he-IL', { maximumFractionDigits: 1 })} דונם`,
      juris: f.attributes.jurstiction_area_name || '—',
      _files: f.attributes.pl_url
        ? [{ name: 'מסמכי התכנית (תקנון, תשריט)', format: 'מבא״ת', url: f.attributes.pl_url, external: true }]
        : [],
    })),
  },
};

const hasPreview = (portalId) => Boolean(PREVIEWS[portalId]);

/**
 * The files under one row.
 *
 * Plain link navigations, so CORS never applies - these reach hosts a fetch()
 * could not read. Two things learned by probing rather than assuming:
 *
 * 1. The `download` attribute is ignored for cross-origin URLs. Every one of
 *    these is cross-origin, so it would have done nothing; the link opens in a
 *    new tab instead, which is also where a WAF interstitial can run.
 * 2. data.gov.il serves PDFs directly (200 application/pdf) but answers CSV and
 *    XLSX with a JavaScript WAF challenge page. A real browser passes it; an
 *    automated client does not, so this could not be verified end-to-end here.
 *    The note under the list warns rather than letting a blank page surprise.
 *
 * Size and format are shown up front - one of these is a 71 MB CSV.
 */
const WAF_FORMATS = new Set(['CSV', 'XLSX', 'XLS', 'ZIP']);

function files(list) {
  const mayChallenge = list.some((f) => WAF_FORMATS.has(f.format));
  return `
    <ul class="files">
      ${list.map((f) => `
        <li>
          <a href="${esc(f.url)}" target="_blank" rel="noopener" dir="auto">
            <span class="f-fmt">${esc(f.format)}</span>
            <span class="f-name">${esc(f.name)}</span>
            ${f.size ? `<span class="f-size">${esc(bytes(f.size))}</span>` : ''}
            ${f.rows ? '<span class="f-tag">ניתן לשאילתה</span>' : ''}
            <span class="f-go">${f.external ? '↗' : '⭳'}</span>
          </a>
        </li>`).join('')}
    </ul>
    ${mayChallenge ? `
      <p class="files-note" dir="auto">
        קבצי CSV/XLSX מוגשים דרך ה-WAF של data.gov.il. אם נפתח דף ביניים —
        המתן רגע, ההורדה מתחילה מעצמה. קבצי PDF מוגשים ישירות.
      </p>` : ''}`;
}

/**
 * A column header, interactive only where the server can actually sort by it.
 *
 * A plain <th> for the rest is deliberate. The alternative - sorting the fetched
 * page client-side - produces a header that behaves identically to its
 * neighbours while answering a different question ("first of these 50" rather
 * than "first of 1,197").
 */
function headCell(spec, key, label, state) {
  const field = spec.sortable?.[key];
  if (!field) return `<th>${esc(label)}</th>`;

  const active = state.sort === field;
  const next = active && state.dir === 'asc' ? 'desc' : 'asc';
  const mark = active ? (state.dir === 'asc' ? '▲' : '▼') : '↕';
  return `
    <th class="sortable${active ? ' sorted' : ''}" data-sort="${esc(field)}" data-dir="${next}"
        tabindex="0" role="button" aria-sort="${active ? (state.dir === 'asc' ? 'ascending' : 'descending') : 'none'}"
        title="מיון בשרת, על כל התוצאות ולא על העמוד המוצג">${esc(label)}<span class="s-mark">${mark}</span></th>`;
}

function table(spec, rows, state) {
  if (!rows.length) return '<div class="notice info" dir="auto">הבקשה הצליחה אך לא הוחזרו רשומות.</div>';
  const expandable = rows.some((r) => r._files?.length);

  return `
    <div class="matrix-wrap${spec.scroll ? ' scroll' : ''}">
      <table class="matrix preview${expandable ? ' expandable' : ''}">
        <thead><tr>
          ${expandable ? '<th class="c-x"></th>' : ''}
          ${spec.columns.map(([key, label]) => headCell(spec, key, label, state)).join('')}
        </tr></thead>
        <tbody>
          ${rows.map((r, i) => {
            const has = r._files?.length;
            return `
            <tr class="${has ? 'has-files' : ''}" ${has ? `data-row="${i}" tabindex="0" role="button"` : ''}>
              ${expandable ? `<td class="c-x">${has ? '<span class="x-mark">▾</span>' : ''}</td>` : ''}
              ${spec.columns.map(([key], c) =>
                `<td dir="auto"${c === 0 ? ' class="ident"' : ''}>${esc(r[key])}</td>`).join('')}
            </tr>
            ${has ? `
            <tr class="files-row" data-files="${i}" hidden>
              <td colspan="${spec.columns.length + 1}">${files(r._files)}</td>
            </tr>` : ''}`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

/**
 * Page numbers to actually render: first, last, and the current one's immediate
 * neighbours. 1,197 datasets is 24 pages and 626 filtered is 13 - listing them
 * all would be a wall of numbers nobody aims at.
 */
function pageWindow(cur, last) {
  const want = [...new Set([0, cur - 1, cur, cur + 1, last])];
  return want.filter((p) => p >= 0 && p <= last).sort((a, b) => a - b);
}

/**
 * Offset paging over the whole result set - not over what was fetched. `start`
 * is a server offset, so page 5 of a filtered search is the server's page 5 of
 * that filter, which is why every control that changes the result set resets it
 * to 0: page 20 of 1,197 does not exist once a filter cuts it to 626.
 */
function pager(spec, state, total, shown) {
  if (!spec.paged || total == null || !shown) return '';
  const last = Math.ceil(total / spec.pageSize) - 1;
  if (last < 1) return '';
  const cur = Math.floor(state.start / spec.pageSize);

  const btn = (p, label) =>
    `<button type="button" class="pg${p === cur ? ' cur' : ''}" data-start="${p * spec.pageSize}"${
      p === cur ? ' aria-current="page"' : ''}>${esc(label)}</button>`;
  const dead = (label) => `<button type="button" class="pg" disabled>${esc(label)}</button>`;

  const nums = [];
  let prev = -1;
  for (const p of pageWindow(cur, last)) {
    if (prev >= 0 && p > prev + 1) nums.push('<span class="pg-gap">…</span>');
    nums.push(btn(p, String(p + 1)));
    prev = p;
  }

  return `
    <nav class="pager" aria-label="ניווט בין עמודים" dir="rtl">
      ${cur > 0 ? btn(cur - 1, 'הקודם') : dead('הקודם')}
      ${nums.join('')}
      ${cur < last ? btn(cur + 1, 'הבא') : dead('הבא')}
    </nav>`;
}

function bindPager(scope, state, reload) {
  scope.querySelectorAll('.pager .pg[data-start]').forEach((b) => {
    b.addEventListener('click', () => { state.start = Number(b.dataset.start); reload(); });
  });
}

/** The Hebrew column label behind an active sort field, for the status line. */
function sortLabel(spec, state) {
  const key = Object.keys(spec.sortable || {}).find((k) => spec.sortable[k] === state.sort);
  const col = spec.columns.find(([k]) => k === key);
  return `${col ? col[1] : state.sort} ${state.dir === 'asc' ? '↑' : '↓'}`;
}

/**
 * Wires the sortable headers. Each click re-requests with a new `sort=` rather
 * than reordering what is on screen - the whole point is that it sorts the
 * collection, not the page.
 */
function bindSort(scope, state, reload) {
  scope.querySelectorAll('th.sortable').forEach((th) => {
    const apply = () => {
      state.sort = th.dataset.sort;
      state.dir = th.dataset.dir;
      reload();
    };
    th.addEventListener('click', apply);
    th.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); apply(); }
    });
  });
}

/** Wires row expansion. Called after every render, since the table is replaced. */
function bindRows(scope) {
  scope.querySelectorAll('tr.has-files').forEach((tr) => {
    const toggle = () => {
      const target = scope.querySelector(`tr[data-files="${tr.dataset.row}"]`);
      if (!target) return;
      target.hidden = !target.hidden;
      const mark = tr.querySelector('.x-mark');
      if (mark) mark.textContent = target.hidden ? '▾' : '▴';
    };
    tr.addEventListener('click', toggle);
    tr.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });
  });
}

/**
 * Renders into `node` for a portal.
 *
 * Portals that are not browser-callable get an explanation rather than a failed
 * request - that distinction is the whole point of the map, so the drill-in has
 * to respect it instead of showing a broken panel.
 */
async function openPortal(node, portal) {
  const spec = PREVIEWS[portal.id];

  if (!spec) {
    node.innerHTML = `
      <div class="drill">
        <div class="drill-head">
          <h2 dir="auto">${esc(portal.name_he)}</h2>
          <button type="button" class="drill-close">סגור ✕</button>
        </div>
        <div class="notice info" dir="auto">
          ${portal.browser_count === 0
            ? 'אף ממשק בפורטל הזה אינו ניתן לקריאה מדפדפן — ראה את הסיבה בכרטיסי הממשקים למטה.'
            : 'אין תצוגה מקדימה מוגדרת לפורטל הזה.'}
        </div>
      </div>`;
    return;
  }

  node.innerHTML = `
    <div class="drill">
      <div class="drill-head">
        <h2 dir="auto">${esc(portal.name_he)}</h2>
        <button type="button" class="drill-close">סגור ✕</button>
      </div>
      <p class="drill-sub" dir="auto">${esc(spec.label)}${spec.more
        ? ` <a class="drill-more" href="${esc(spec.more.href)}">${esc(spec.more.label)} ←</a>` : ''}</p>
      <div class="drill-filter">
        <input type="search" class="drill-q" dir="auto" spellcheck="false"
               placeholder="${esc(spec.placeholder)}" aria-label="סינון">
        <span class="drill-scope">${spec.local ? 'סינון מקומי' : 'סינון בשרת'}</span>
      </div>
      ${spec.facets ? '<div class="drill-cols"></div>' : ''}
      <div class="drill-out"></div>
    </div>`;

  const out = node.querySelector('.drill-out');
  const input = node.querySelector('.drill-q');
  const cols = node.querySelector('.drill-cols');
  let cached = null;   // local-filter portals fetch once and re-filter in place

  // Column sort + column filters. Sort starts unset so the first view keeps
  // CKAN's own relevance order rather than imposing one.
  const state = { sort: null, dir: 'asc', start: 0 };
  spec.facets?.forEach((f) => { state[f.key] = ''; });

  /**
   * Anything that changes *which* records match sends you back to page 1.
   * Without this, filtering while on page 20 asks the server for offset 950 of a
   * 626-row result and renders an empty table that looks like "no matches".
   */
  const fromStart = (fn) => (...args) => { state.start = 0; return fn(...args); };

  /**
   * Dropdown options are populated once, from the first unfiltered response.
   *
   * They are deliberately not refreshed afterwards: CKAN narrows search_facets
   * to match the active fq, so re-reading them after a pick would leave the
   * chosen organisation as the only option and strand the user there.
   */
  let facetOpts = null;

  function renderCols() {
    if (!cols || !facetOpts) return;
    cols.innerHTML = spec.facets.map((f) => {
      const items = facetOpts[f.field]?.items || [];
      const opts = items
        .slice()
        .sort((a, b) => b.count - a.count)
        .map((it) => `<option value="${esc(it.name)}"${state[f.key] === it.name ? ' selected' : ''}>`
          + `${esc(it.display_name || it.name)} (${num(it.count)})</option>`)
        .join('');
      return `<select class="col-f" data-key="${esc(f.key)}" aria-label="${esc(f.all)}" dir="auto">
          <option value="">${esc(f.all)}</option>${opts}
        </select>`;
    }).join('');   // No scope badge here: the one above already covers the panel.

    cols.querySelectorAll('.col-f').forEach((sel) => {
      sel.addEventListener('change', () => {
        state[sel.dataset.key] = sel.value;
        fromStart(load)(input.value.trim());
      });
    });
  }

  async function load(query) {
    out.innerHTML = `<div class="skeleton" dir="auto">שולח בקשה…${
      spec.slow && query ? ` <span class="slow-note">${esc(spec.slowNote)}</span>` : ''}</div>`;
    const url = spec.url(spec.local ? '' : query, state);
    const t0 = performance.now();

    try {
      // A local-filter collection is fetched once; re-filtering must not re-hit
      // someone else's server for data already in hand.
      let json = spec.local ? cached : null;
      let ms = 0;
      let status = 200;
      if (!json) {
        // Without a deadline this spins forever on a slow host. GovMap's WFS
        // attribute filters are unindexed over 1.1M parcels and measured at
        // 12-40s, so the ceiling has to clear that or it would abort a request
        // that was going to succeed.
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), spec.slow ? 75000 : 25000);
        const res = await fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
        ms = Math.round(performance.now() - t0);
        status = res.status;
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        json = await res.json();
        if (spec.local) cached = json;
      }

      let rows = spec.rows(json);
      const total = spec.total?.(json);

      if (spec.facetsOf && !facetOpts) {
        facetOpts = spec.facetsOf(json);
        renderCols();
      }

      if (spec.local && query) {
        const q = query.toLowerCase();
        rows = rows.filter((r) => Object.values(r).join(' ').toLowerCase().includes(q));
      }

      out.innerHTML = `
        <div class="ex-status">
          <span class="badge ok">HTTP ${status}</span>
          ${ms ? `<span class="tag">${ms} ms</span>` : '<span class="tag">מהמטמון</span>'}
          ${spec.paged && total != null && rows.length
            ? `<span class="tag" dir="auto">${num(state.start + 1)}–${num(state.start + rows.length)} מתוך ${num(total)} ${esc(spec.unit)}</span>`
            : `<span class="tag" dir="auto">${rows.length} מוצגות${
                total != null ? ` מתוך ${num(total)}` : ''} ${esc(spec.unit)}</span>`}
          ${query ? `<span class="tag" dir="auto">סינון: ${esc(query)}</span>` : ''}
          ${state.sort ? `<span class="tag" dir="auto">ממוין: ${esc(sortLabel(spec, state))}</span>` : ''}
        </div>
        ${rows.length
          ? table(spec, rows, state)
          : `<div class="notice info" dir="auto">אין תוצאות${query ? ` עבור <strong>${esc(query)}</strong>` : ' עבור הסינון שנבחר'}.</div>`}
        ${pager(spec, state, total, rows.length)}
        <p class="drill-url" dir="ltr"><code>${esc(url)}</code></p>`;
      bindRows(out);
      bindSort(out, state, fromStart(() => load(input.value.trim())));
      bindPager(out, state, () => load(input.value.trim()));
    } catch (err) {
      // A cross-origin block reaches JS as an opaque TypeError with no status.
      // Say which of the two it might be rather than inventing a cause.
      const cors = err instanceof TypeError;
      out.innerHTML = `
        <div class="notice error" dir="auto">
          ${err.name === 'AbortError'
            ? 'הבקשה חרגה מזמן ההמתנה. השרת איטי כרגע — נסה שוב, או צמצם את הסינון.'
            : cors
              ? 'הבקשה נחסמה על ידי הדפדפן (CORS) או שהרשת נכשלה — הדפדפן אינו חושף את הסיבה המדויקת.'
              : `הבקשה נכשלה: ${esc(err.message)}`}
        </div>
        <p class="drill-url" dir="ltr"><code>${esc(url)}</code></p>`;
    }
  }

  // Server-side filters hit a government host on every keystroke without this.
  const rerun = debounce(fromStart((q) => load(q)), spec.local ? 120 : 450);
  input.addEventListener('input', (e) => rerun(e.target.value.trim()));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); fromStart(load)(input.value.trim()); }
  });

  await load('');
}

/**
 * Two-level map: portals at the top, APIs underneath, each with a live
 * request panel.
 */



const portalGrid = el('portals');
const list = el('list');
const summary = el('summary');
const stats = el('stats');
const matrix = el('matrix');
const drill = el('drill');
const more = el('more');

let data = { portals: [], apis: [] };
const state = { q: '', browserOnly: false, portal: null, verdict: null };

/**
 * The probe stamp carries an hour now, so an ISO string with an offset is what
 * apis.json holds. Render it in local terms; fall back to the raw value rather
 * than showing "Invalid Date" if the field is ever a bare date again.
 */
function probedAt(raw) {
  const t = new Date(raw);
  if (Number.isNaN(t.getTime())) return raw;
  const date = t.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const time = t.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  return `${date} ${time}`;
}

/** Three states, not two: usable / blocked / unknown. Conflating the last two lies. */
function verdict(api) {
  if (api.browser) return { cls: 'ok', label: 'דפדפן ✓' };
  if (api.status === 200 && !api.cors) return { cls: 'warn', label: 'שרת בלבד' };
  if (api.status === 403) return { cls: 'bad', label: 'חסום' };
  if (api.endpoint === 'unknown' || api.status === 404) return { cls: 'unknown', label: 'לא אותר' };
  // Reachable and CORS-clean, but the contract itself is unresolved (auth, shape).
  // Its own state - folding it into 'server only' would misreport why it fails.
  return { cls: 'limited', label: 'מוגבל' };
}

/* ---------- top view ---------- */

/**
 * One screen holding every API. The detail list below answers "how do I call
 * this"; this answers "what exists, and which of it can I actually use".
 */

const VERDICTS = [
  { cls: 'ok', label: 'ניתן מהדפדפן', hint: '200 + CORS — קריא מדף סטטי' },
  { cls: 'warn', label: 'שרת בלבד', hint: 'עונה, אך ללא CORS — נדרש proxy' },
  { cls: 'limited', label: 'מוגבל', hint: 'נגיש, אך החוזה לא אומת (auth / מבנה)' },
  { cls: 'bad', label: 'חסום', hint: 'נדחה אקטיבית (403)' },
  { cls: 'unknown', label: 'לא אותר', hint: 'הבדיקות החזירו 404 — לא הופרך' },
];

function renderStats() {
  const counts = data.apis.reduce((acc, a) => {
    acc[verdict(a).cls] = (acc[verdict(a).cls] || 0) + 1;
    return acc;
  }, {});

  const total = `
    <div class="stat">
      <span class="stat-n">${data.apis.length}</span>
      <span class="stat-l">ממשקים ב-${data.portals.length} פורטלים</span>
    </div>`;

  // Each tile doubles as a filter - the count is the question, the list is the answer.
  const tiles = VERDICTS.map((v) => {
    const active = state.verdict === v.cls ? ' active' : '';
    return `
      <button class="stat ${v.cls}${active}" type="button" data-verdict="${v.cls}" title="${esc(v.hint)}">
        <span class="stat-n">${counts[v.cls] || 0}</span>
        <span class="stat-l">${esc(v.label)}</span>
      </button>`;
  }).join('');

  stats.innerHTML = total + tiles;
  stats.querySelectorAll('[data-verdict]').forEach((btn) =>
    btn.addEventListener('click', () => {
      state.verdict = state.verdict === btn.dataset.verdict ? null : btn.dataset.verdict;
      renderStats();
      renderList();
    })
  );
}

function renderMatrix() {
  const head = `
    <thead>
      <tr>
        <th>ממשק</th><th>תחום</th><th>פורמט</th><th>auth</th>
        <th>HTTP</th><th>CORS</th><th>מצב</th>
      </tr>
    </thead>`;

  // Grouped by portal so the table reads as the same hierarchy as the page.
  const body = data.portals.map((p) => {
    const rows = data.apis.filter((a) => a.portal === p.id);
    if (!rows.length) return '';
    return `
      <tbody>
        <tr class="grp">
          <th colspan="7" dir="auto">${esc(p.name_he)} <span class="grp-sub" dir="ltr">${esc(p.name)}</span></th>
        </tr>
        ${rows.map((a) => {
          const v = verdict(a);
          return `
            <tr class="row ${v.cls}" data-id="${esc(a._id)}" tabindex="0" role="button">
              <td dir="auto">${esc(a.name)}</td>
              <td>${esc(a.domain)}</td>
              <td>${esc(a.format)}</td>
              <td>${esc(a.auth)}</td>
              <td>${a.status ?? '—'}</td>
              <td>${a.cors ? esc(a.cors) : '✗'}</td>
              <td><span class="badge ${v.cls}">${esc(v.label)}</span></td>
            </tr>`;
        }).join('')}
      </tbody>`;
  }).join('');

  matrix.innerHTML = head + body;

  const jump = (id) => {
    // A row can point at a card the current filters hide, so clear them first.
    reset();
    const card = list.querySelector(`[data-id="${CSS.escape(id)}"]`);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 1200);
  };

  matrix.querySelectorAll('.row').forEach((tr) => {
    tr.addEventListener('click', () => jump(tr.dataset.id));
    tr.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); jump(tr.dataset.id); }
    });
  });
}

/* ---------- portal level ---------- */

function portalCard(p) {

    <button class="portal${active}" data-portal="${esc(p.id)}" type="button">

        <span class="badge ${cls}">${p.browser_count}/${p.api_count}</span>
      </span>
      <span class="p-sub" dir="ltr">${esc(p.name)}</span>

      <span class="meta">
        <span class="tag">${esc(p.kind)}</span>

      ${hasPreview(p.id) ? '<span class="p-open">צפה בנתונים חיים ←</span>' : ''}
    </button>`;
}

function renderPortals() {
  portalGrid.innerHTML = data.portals.map(portalCard).join('');
  portalGrid.querySelectorAll('.portal').forEach((btn) =>
    btn.addEventListener('click', () => {
      // Second click on the same portal clears both the filter and the drill-in.
      const same = state.portal === btn.dataset.portal;
      state.portal = same ? null : btn.dataset.portal;
      renderPortals();
      renderList();

      if (same) {
        drill.innerHTML = '';
        return;
      }
      // The drill-in lives past the mobile "continue" cut - a collapsed
      // <details> hides it regardless of what's written into it, so open
      // it first or the tap looks like it did nothing.
      more.open = true;
      const portal = data.portals.find((p) => p.id === state.portal);
      openPortal(drill, portal);
      drill.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    })
  );
}

/* ---------- api level ---------- */

function apiCard(api, i) {
  const v = verdict(api);
  const url = api.endpoint !== 'unknown' ? api.endpoint : null;
  const portal = data.portals.find((p) => p.id === api.portal);
  const canTry = Boolean(api.example || url);

  return `
    <article class="card api ${v.cls}" data-id="${esc(api._id)}">
      <div class="api-head">
        <h3 dir="auto">${esc(api.name)}</h3>
        <span class="badge ${v.cls}">${esc(v.label)}</span>
      </div>
      <div class="meta">
        <span class="tag" dir="auto">${esc(portal?.name_he || api.source)}</span>
        <span class="tag">${esc(api.domain)}</span>
        <span class="tag">${esc(api.format)}</span>
        <span class="tag">auth: ${esc(api.auth)}</span>
        <span class="tag">HTTP ${api.status ?? '—'}</span>
        <span class="tag">CORS: ${api.cors ? esc(api.cors) : '✗'}</span>
      </div>
      ${url ? `<p class="endpoint" dir="ltr"><code>${esc(api.method)} ${esc(url)}</code></p>` : ''}
      <p dir="auto">${esc(api.notes)}</p>
      ${canTry
        ? `<button class="toggle-ex" type="button" data-i="${i}">נסה בדפדפן ▾</button>
           <div class="ex-slot" data-i="${i}" hidden></div>`
        : ''}
    </article>`;
}

function renderList() {
  const q = state.q.toLowerCase();
  const shown = data.apis.filter((a) => {
    if (state.portal && a.portal !== state.portal) return false;
    if (state.verdict && verdict(a).cls !== state.verdict) return false;
    if (state.browserOnly && !a.browser) return false;
    if (!q) return true;
    return [a.name, a.source, a.source_he, a.domain, a.endpoint, a.notes]
      .join(' ').toLowerCase().includes(q);
  });

  const callable = data.apis.filter((a) => a.browser).length;
  const scope = [
    state.portal ? data.portals.find((p) => p.id === state.portal)?.name_he : null,
    state.verdict ? VERDICTS.find((v) => v.cls === state.verdict)?.label : null,
  ].filter(Boolean).join(' · ') || 'הכל';
  summary.textContent =
    `${scope} · ${shown.length} מתוך ${data.apis.length} ממשקים · ` +
    `${callable} ניתנים לקריאה ישירה מהדפדפן`;

  list.innerHTML = shown.length
    ? shown.map(apiCard).join('')
    : '<div class="notice info">לא נמצאו תוצאות.</div>';

  // Explorers are built on demand - one live panel per API, only once opened.
  list.querySelectorAll('.toggle-ex').forEach((btn) => {
    btn.addEventListener('click', () => {
      const slot = list.querySelector(`.ex-slot[data-i="${btn.dataset.i}"]`);
      const opening = slot.hidden;
      slot.hidden = !opening;
      btn.textContent = opening ? 'נסה בדפדפן ▴' : 'נסה בדפדפן ▾';
      if (opening && !slot.dataset.ready) {
        attachExplorer(slot, shown[Number(btn.dataset.i)]);
        slot.dataset.ready = '1';
      }
    });
  });
}

/* ---------- wiring ---------- */

el('q').addEventListener('input', (e) => { state.q = e.target.value.trim(); renderList(); });
el('browser-only').addEventListener('change', (e) => {
  state.browserOnly = e.target.checked; renderList();
});
drill.addEventListener('click', (e) => {
  if (!e.target.closest('.drill-close')) return;
  drill.innerHTML = '';
  state.portal = null;
  renderPortals();
  renderList();
});

function reset() {
  state.portal = null; state.q = ''; state.browserOnly = false; state.verdict = null;
  drill.innerHTML = '';
  el('q').value = ''; el('browser-only').checked = false;
  renderStats(); renderPortals(); renderList();
}

el('clear').addEventListener('click', reset);

/**
 * The single-file build (dist/map.html) embeds the map, because a page opened
 * from disk cannot fetch its own apis.json — origin 'null' is refused. Served
 * builds fetch it as normal. Keeping the choice here means the bundler only
 * prepends data and never rewrites control flow.
 */
async function loadData() {
  if (globalThis.__API_DATA__) return globalThis.__API_DATA__;
  const res = await fetch(new URL('../apis.json', import.meta.url));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function load() {
  try {
    data = await loadData();
    // Browser-callable first - that is the decision most visitors are here to make.
    data.apis.sort((a, b) => Number(b.browser) - Number(a.browser) || a.source.localeCompare(b.source));
    // Identity that survives re-sorting and re-filtering, so a matrix row can
    // still find its card. Endpoints repeat across entries; name does not.
    data.apis.forEach((a, i) => { a._id = `${a.portal}-${i}`; });
    el('probed').textContent = `נבדק: ${probedAt(data.probed)}`;
    // The exact recorded value, offset and all, stays reachable on hover.
    el('probed').title = data.probed;
    renderStats();
    renderMatrix();
    renderPortals();
    renderList();
  } catch (err) {
    list.innerHTML = `<div class="notice error">טעינת apis.json נכשלה: ${esc(err.message)}</div>`;
  }
}

load();

</script>
</body>
</html>
